<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MODI ROSSI · Monitoreo de Dispositivos</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.1.0/tabler-icons.min.css">
<style>
  :root {
    --mr-primary: #0F3D5C;
    --mr-primary-light: #1A5277;
    --mr-bg: #F4F7F9;
    --mr-border: #DCE6EC;
    --mr-text-muted: #6B8499;
    --mr-coral: #C2185B;
    --mr-coral-bg: #FCE4EC;
    --mr-coral-text: #880E4F;
    --mr-amber: #E8A23D;
    --mr-amber-bg: #FFF4E5;
    --mr-amber-text: #9A6A12;
    --mr-teal: #1D9E75;
    --mr-teal-bg: #E1F5EE;
    --mr-teal-text: #085041;
  }
  * { box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; margin:0; padding:0; }
  body { background: var(--mr-bg); color:#1F2937; margin:0; height:100vh; overflow:hidden; }
  .app { background:#fff; width:100%; display:flex; flex-direction:column; height:100vh; border-right:0.5px solid var(--mr-border); border-left:0.5px solid var(--mr-border); }
  .header { background: var(--mr-primary); color:#fff; display:flex; align-items:center; justify-content:space-between; padding:0.85rem 1.25rem; flex-shrink:0; }
  .header-left { display:flex; align-items:center; gap:10px; }
  .logo { width:34px; height:34px; border-radius:8px; background:var(--mr-coral); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .title { font-weight:700; font-size:15px; line-height:1.2; }
  .subtitle { font-size:11px; line-height:1.2; color:#A9C3D6; }
  .user-pill { font-size:12px; background:var(--mr-primary-light); padding:4px 12px; border-radius:14px; display:flex; align-items:center; gap:6px; }
  .body { display:flex; flex:1; overflow:hidden; position:relative; }
  .sidebar { 
    width:52px; background:#F1F3F5; border-right:1px solid var(--mr-border);
    padding:0.5rem 0; display:flex; flex-direction:column; gap:2px; flex-shrink:0;
  }
  .nav-btn { 
    position:relative;
    text-align:center; border:none; border-left:3px solid transparent; 
    background:transparent; padding:13px 0;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; color:#8A97A5; width:100%; 
  }
  .nav-btn.active { background:#fff; border-left-color:var(--mr-primary); color:var(--mr-primary); }
  .nav-btn:hover:not(.active) { background:#E4E8EC; color:var(--mr-primary); }
  .nav-btn .nav-tooltip {
    display:none; position:absolute; left:54px; top:50%; transform:translateY(-50%);
    background:var(--mr-primary); color:#fff; font-size:12px; font-weight:500;
    padding:5px 10px; border-radius:6px; white-space:nowrap; z-index:300;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
    pointer-events:none;
  }
  .nav-btn .nav-tooltip::before {
    content:''; position:absolute; right:100%; top:50%; transform:translateY(-50%);
    border:5px solid transparent; border-right-color:var(--mr-primary);
  }
  .nav-label { display:none; font-size:9px; color:inherit; }
  .btn-icon-tooltip {
    position:relative; width:30px; height:30px; border-radius:6px;
    border:1px solid var(--mr-border); background:#fff; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    color:var(--mr-text-muted); flex-shrink:0;
  }
  .btn-icon-tooltip:hover { background:var(--mr-bg); color:var(--mr-primary); border-color:var(--mr-primary); }
  .pac-filtro-chip {
    font-size:12px; padding:4px 10px; border-radius:20px;
    border:1px solid var(--mr-border); background:#fff;
    color:var(--mr-text-muted); cursor:pointer; transition:all 0.15s;
    display:inline-flex; align-items:center;
  }
  .pac-filtro-chip:hover { border-color:var(--mr-primary); color:var(--mr-primary); }
  .pac-filtro-chip.active { background:var(--mr-primary); color:#fff; border-color:var(--mr-primary); }
  .pac-filtro-chip[data-tipo="T1"].active { background:#2E75B6; border-color:#2E75B6; }
  .pac-filtro-chip[data-tipo="T2"].active { background:#C2185B; border-color:#C2185B; }
  .pac-filtro-chip[data-tipo="T3"].active { background:#00796B; border-color:#00796B; }
  .pac-filtro-chip[data-tipo="T4"].active { background:#7B1FA2; border-color:#7B1FA2; }
  #global-tooltip {
    display:none; position:fixed; z-index:9999;
    background:var(--mr-primary); color:#fff; font-size:11px; font-weight:500;
    padding:4px 8px; border-radius:5px; white-space:nowrap;
    pointer-events:none; box-shadow:0 2px 8px rgba(0,0,0,0.15);
  }
  .content { flex:1; padding:1.25rem 1.5rem; min-width:0; overflow-y:auto; height:100%; }
  h3 { color:var(--mr-primary); font-weight:700; font-size:16px; margin:0 0 1rem; }
  .stat-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(120px,1fr)); gap:12px; margin-bottom:1.5rem; }
  .stat-card { background:var(--mr-bg); border-radius:8px; padding:1rem; }
  .stat-label { font-size:12px; color:var(--mr-text-muted); min-height:2.4em; line-height:1.2; }
  .stat-num { font-size:22px; font-weight:700; color:var(--mr-primary); margin-top:2px; }
  .section-label { font-size:13px; color:var(--mr-text-muted); margin:1.25rem 0 0.75rem; font-weight:500; }
  .alert-row { border-radius:10px; padding:0.75rem 1rem; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:8px; }
  .alert-row.urgente { background:var(--mr-coral-bg); }
  .alert-row.proximo { background:var(--mr-amber-bg); }
  .alert-title { font-weight:700; font-size:13px; }
  .alert-row.urgente .alert-title { color:var(--mr-coral-text); }
  .alert-row.proximo .alert-title { color:var(--mr-amber-text); }
  .alert-sub { font-size:12px; }
  .alert-row.urgente .alert-sub { color:var(--mr-coral-text); }
  .alert-row.proximo .alert-sub { color:var(--mr-amber-text); }
  .wa-btn { background:#25D366; color:#fff; border:none; border-radius:6px; padding:6px 12px; font-size:12px; font-weight:700; text-decoration:none; display:inline-flex; align-items:center; gap:4px; }
  .empty { text-align:center; color:#9CA9B5; padding:1.5rem; font-size:13px; border:0.5px solid var(--mr-border); border-radius:8px; }
  .control-row { border:0.5px solid var(--mr-border); border-radius:8px; padding:0.6rem 0.8rem; display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:6px; font-size:13px; }
  .control-row .muted { color:var(--mr-text-muted); }
  label { display:block; font-size:13px; font-weight:700; margin-bottom:4px; color:#374151; }
  select, input, textarea {
    width:100%; padding:8px 10px; border:1px solid var(--mr-border); border-radius:6px; font-size:13px; background:#fff; color:#1F2937;
  }
  textarea { resize:vertical; min-height:60px; }
  .field { margin-bottom:1rem; }
  .field-row { display:flex; gap:8px; }
  .field-row select, .field-row input { flex:1; }
  .icon-btn { flex-shrink:0; padding:0 10px; border:1px solid var(--mr-border); border-radius:6px; background:#fff; cursor:pointer; color:var(--mr-primary); display:flex; align-items:center; }
  .icon-btn:hover { background:var(--mr-bg); }
  .btn-primary { background:var(--mr-primary); color:#fff; border:none; border-radius:6px; padding:10px 18px; font-size:13px; font-weight:700; cursor:pointer; }
  .btn-primary:hover { background:var(--mr-primary-light); }
  .btn-secondary { background:#fff; border:1px solid var(--mr-border); color:#374151; border-radius:6px; padding:10px 18px; font-size:13px; font-weight:700; cursor:pointer; }
  .btn-secondary:hover { background:var(--mr-bg); }
  .msg { display:none; border-radius:8px; padding:0.75rem 1rem; font-size:13px; margin-top:0.5rem; }
  .msg.ok { display:block; background:var(--mr-teal-bg); color:var(--mr-teal-text); }
  .msg.err { display:block; background:var(--mr-coral-bg); color:var(--mr-coral-text); }
  .preview { font-size:13px; color:var(--mr-text-muted); margin-bottom:1rem; }
  .day-btn { font-size:12px; padding:6px 12px; border:1px solid var(--mr-border); border-radius:6px; background:#fff; cursor:pointer; color:#374151; }
  .day-btn.active { background:#E6F1FB; border-color:#85B7EB; color:#0C447C; font-weight:700; }
  .pill { display:inline-flex; align-items:center; gap:6px; background:var(--mr-bg); border-radius:6px; padding:4px 10px; font-size:12px; }
  .pill button { border:none; padding:0; background:transparent; display:flex; cursor:pointer; color:var(--mr-text-muted); }
  table { width:100%; border-collapse:collapse; font-size:13px; table-layout:fixed; }
  th { text-align:left; padding:8px 6px; font-weight:700; color:var(--mr-text-muted); border-bottom:0.5px solid var(--mr-border); font-size:12px; }
  td { padding:8px 6px; border-bottom:0.5px solid var(--mr-border); }
  .occ-cell { border-radius:6px; padding:6px 4px; text-align:center; font-size:11px; }
  .occ-free { border:0.5px solid var(--mr-border); color:#9CA9B5; transition:all 0.15s; }
  .occ-free:hover { background:var(--mr-bg); color:var(--mr-primary); border-color:var(--mr-primary); }
  .occ-taken { background:var(--mr-coral-bg); color:var(--mr-coral-text); font-weight:700; overflow:hidden; cursor:pointer; transition:filter 0.15s; }
  .occ-taken:hover { filter:brightness(0.93); }
  .occ-online { background:#E6F1FB; color:#0C447C; font-weight:700; overflow:hidden; cursor:pointer; transition:filter 0.15s; }
  .occ-online:hover { filter:brightness(0.93); }
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); align-items:center; justify-content:center; z-index:50; }
  .modal-overlay.show { display:flex; }
  .modal { background:#fff; border-radius:12px; border:0.5px solid var(--mr-border); padding:1.25rem; max-width:420px; width:90%; max-height:90vh; overflow-y:auto; }
  .list-row { border:0.5px solid var(--mr-border); border-radius:8px; padding:0.75rem 1rem; display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
  .badge-purple { background:#EEEDFE; color:#3C3489; border-radius:8px; padding:0.75rem 1rem; display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:8px; }  .risk-badge { font-size:11px; font-weight:700; padding:2px 8px; border-radius:6px; }
  .risk-alto { background:var(--mr-coral); color:#fff; }
  .risk-bajo { background:var(--mr-teal-bg); color:var(--mr-teal-text); }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {
    body { overflow:auto; }
    .app { border-radius:0; border:none; height:100%; min-height:100vh; max-width:100%; }
    /* Header compacto */
    .header { padding:0.6rem 1rem; }
    .subtitle { display:none; }
    .title { font-size:14px; }
    .logo { width:30px; height:30px; border-radius:7px; }
    .user-pill { font-size:11px; padding:3px 8px; }

    /* Sidebar → bottom nav */
    .body { flex-direction:column-reverse; }
    .sidebar {
      width:100%; height:56px; flex-direction:row;
      border-right:none; border-top:1px solid var(--mr-border);
      padding:0; justify-content:space-around; flex-shrink:0;
    }
    .nav-btn {
      flex:1; border-left:none; border-top:3px solid transparent;
      padding:6px 0; flex-direction:column; gap:2px; font-size:9px;
    }
    .nav-btn.active { border-left-color:transparent; border-top-color:var(--mr-primary); background:var(--mr-bg); }
    .nav-btn .nav-tooltip { display:none !important; }
    .nav-label { display:block; }

    /* Contenido */
    .content { padding:1rem; height:auto; overflow-y:auto; flex:1; min-height:0; }

    /* Formularios — grillas 2col → 1col */
    div[style*="grid-template-columns:1fr 1fr"] {
      display:block !important;
    }
    div[style*="grid-template-columns:1fr 1fr"] > * {
      width:100% !important;
    }

    /* Tarjetas de alerta en dashboard */
    .alert-row { flex-direction:column; align-items:flex-start; }
    .alert-row > div:last-child { display:flex; flex-wrap:wrap; gap:6px; width:100%; }

    /* Botones de acción más grandes en mobile */
    .btn-primary, .btn-secondary { padding:10px 14px; }

    /* Modales full-width */
    .modal { width:95% !important; max-width:95% !important; border-radius:12px; }

    /* Tablas con scroll */
    .content table { font-size:11px; }

    /* Pacientes — botones de acción */
    .btn-icon-tooltip { width:36px; height:36px; }

    /* Stat grid */
    .stat-grid { grid-template-columns:repeat(2, 1fr); }

    /* Ocultar columnas no esenciales en tablas de agenda */
    .hide-mobile { display:none !important; }
  }

  @media (max-width: 480px) {
    .stat-grid { grid-template-columns:1fr 1fr; }
    .content { padding:0.75rem; }
    h3 { font-size:15px; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-left">
      <div class="logo" style="width:42px; height:42px; border-radius:10px;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2 7 4-14 2 7h6"/></svg>
      </div>
      <div>
        <div class="title">MODI ROSSI</div>
        <div class="subtitle" id="hdr-servicio">Monitoreo de Dispositivos · Servicio de Cardiología</div>
        <div class="subtitle" id="hdr-institucion">HIGA Prof. Dr. Rodolfo Rossi</div>
      </div>
    </div>
    <div id="header-user" style="display:none; align-items:center; gap:8px;">
      <div class="user-pill" style="display:flex; align-items:center; gap:8px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>

          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div id="body-login" style="display:none; justify-content:center; align-items:center; padding:3rem 1rem;">
    <div style="background:#fff; border:0.5px solid var(--mr-border); border-radius:var(--border-radius-lg); padding:2rem; width:100%; max-width:360px; text-align:center;">
      <div style="margin-bottom:1.5rem;">
        <div style="width:48px; height:48px; border-radius:12px; background:var(--mr-coral); display:flex; align-items:center; justify-content:center; margin:0 auto 0.75rem;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2 7 4-14 2 7h6"/></svg>
        </div>
        <div style="font-weight:700; font-size:18px; color:var(--mr-primary);">MODI ROSSI</div>
        <div style="font-size:12px; color:var(--mr-text-muted);" id="login-servicio">Monitoreo de Dispositivos · Servicio de Cardiología</div>
        <div style="font-size:12px; color:var(--mr-text-muted);" id="login-institucion">HIGA Prof. Dr. Rodolfo Rossi</div>
      </div>
      <div class="field" style="text-align:center;">
        <label style="display:block; margin-bottom:6px;">Ingresá tu DNI para continuar</label>
        <input type="text" id="login-dni" placeholder="Ej: 28123456" style="text-align:center; font-size:16px; letter-spacing:2px; max-width:220px; margin:0 auto; display:block;">
      </div>
      <div id="login-msg" class="msg err" style="display:none; margin-bottom:0.75rem;"></div>
      <button id="btn-login" class="btn-primary" style="width:100%;">Ingresar</button>
      <input type="hidden" id="role-select" value="personal">
    </div>
  </div>

  <div class="body" id="body-personal" style="display:none;">
    <div class="sidebar">
      <button class="nav-btn active" data-view="dash">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>

        <span class="nav-tooltip">Configuración</span>
        <span class="nav-label">Config.</span>
      </button>
    </div>
    <div class="content">
      <div id="view-dash"></div>
      <div id="view-form" style="display:none;"></div>
      <div id="view-agenda" style="display:none;"></div>
      <div id="view-pac" style="display:none;"></div>
      <div id="view-prof" style="display:none;"></div>
      <div id="view-investigacion" style="display:none;"></div>
      <div id="view-config" style="display:none;"></div>
    </div>
  </div>

  <div class="body" id="body-paciente" style="display:none;">
    <div class="content" style="display:flex; justify-content:center;">
      <div style="width:340px;">

        <div id="login-paciente" style="padding-top:2rem;">
          <div style="text-align:center; margin-bottom:1.5rem;">
            <div style="width:48px; height:48px; border-radius:12px; background:var(--mr-coral); display:flex; align-items:center; justify-content:center; margin:0 auto 0.75rem;">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2 7 4-14 2 7h6"/></svg>
            </div>
            <div style="font-weight:700; font-size:18px; color:var(--mr-primary);">MODI ROSSI</div>
            <div style="font-size:12px; color:var(--mr-text-muted);" id="loginpac-servicio">Monitoreo de Dispositivos · Servicio de Cardiología</div>
            <div style="font-size:12px; color:var(--mr-text-muted);" id="loginpac-institucion">HIGA Prof. Dr. Rodolfo Rossi</div>
          </div>

<script>
// ===================== SUPABASE CONFIG =====================
const SUPABASE_URL = 'https://ivkuwhidlanbfstkyjou.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2a3V3aGlkbGFuYmZzdGt5am91Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5ODU4MzcsImV4cCI6MjA5NzU2MTgzN30.xz7_GSP3Wnt-MgZFTabgHj2Wn6GG3IQIG6CkqQkQaWo';

const _h = () => ({ 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY });
const _hj = () => ({ ..._h(), 'Content-Type': 'application/json', 'Prefer': 'return=representation' });

async function sbGet(tabla, qs = '') {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${tabla}?select=*${qs ? '&' + qs : ''}`, { headers: _h() });
  if (!r.ok) { console.error('sbGet', tabla, r.status, await r.text()); return []; }
  return r.json();
}
async function sbInsert(tabla, datos) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${tabla}`, { method: 'POST', headers: _hj(), body: JSON.stringify(datos) });
  if (!r.ok) { console.error('sbInsert', tabla, r.status, await r.text()); return null; }
  const res = await r.json(); return Array.isArray(res) ? res[0] : res;
}
async function sbUpdate(tabla, filtro, datos) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${tabla}?${filtro}`, { method: 'PATCH', headers: _hj(), body: JSON.stringify(datos) });
  if (!r.ok) console.error('sbUpdate', tabla, r.status, await r.text());
  return r.ok;
}
async function sbDelete(tabla, filtro) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${tabla}?${filtro}`, { method: 'DELETE', headers: _h() });
  return r.ok;
}

// ===================== VARIABLES GLOBALES =====================
const TIPOS = { T1:{nombre:'Marcapasos',lapso:12}, T2:{nombre:'CDI',lapso:6}, T3:{nombre:'TRC (resincronizador)',lapso:6}, T4:{nombre:'CDI+TRC',lapso:6} };

let pacientes = [], dispositivos = [], controles = [], turnosReservados = [], accionesContacto = [], profesionales = [];
let profesionalLogueado = null, pacienteLogueado = null, controlEditandoId = null;
let _submitRunning = false;
let _submitAbort = null;
let parametrosTecnicosTemp = {};
let nextPacienteId = 1, nextDispositivoId = 1, nextControlId = 1, nextProfesionalId = 4, nextCodigoNum = 1;

let MARCAS_DISPOSITIVOS = ['Biotronik','Medtronic','St. Jude / Abbott','Boston Scientific','MicroPort','Otro'];
let MOTIVOS_IMPLANTE = ['Bloqueo AV completo (BAV de 3° grado)','Bloqueo AV de alto grado','Bloqueo AV de 2° grado Mobitz II','Bloqueo AV de 2° grado tipo 2:1','Disfunción del nodo sinusal','Síndrome de taquicardia-bradicardia','Bloqueo bifascicular con síncope','Prevención primaria de muerte súbita (FEVI ≤ 35%)','Prevención secundaria de muerte súbita (TV/FV)','Insuficiencia cardíaca con BCRI','Insuficiencia cardíaca con BCRno-I','Insuficiencia cardíaca con BCRI/BCRno-I + prevención 1ª de MS','Insuficiencia cardíaca con BCRI/BCRno-I + prevención 2ª de MS','Otro'];
let AGENDA_CONFIG = { diasAtencion:[4], horarios:['09:00','09:10','09:20','09:30','09:40','09:50'], diasBloqueados:[] };
let CONFIG_INSTITUCION = { servicio:'Servicio de Cardiología', institucion:'HIGA Prof. Dr. Rodolfo Rossi' };
let VENTANA_DIAS = 21, HORIZONTE_TURNOS_DIAS = 21, TURNOS_ONLINE_POR_DIA = 2;
let FECHA_IMPLEMENTACION_STR = '2026-08-01';
let FECHA_IMPLEMENTACION = new Date(2026, 7, 1); // local

// ===================== HELPERS DE FECHA (sin bug UTC) =====================
// REGLA: todas las fechas del dominio (control, turno, implante) son strings 'YYYY-MM-DD'
// y se convierten a Date LOCAL con parseLocalDate. NUNCA new Date(string) directamente.

function parseFechaSB(val) {
  // Convierte cualquier valor de fecha de Supabase a string 'YYYY-MM-DD'
  if (!val) return '';
  if (typeof val === 'string') return val.slice(0, 10);
  if (val instanceof Date) {
    const y = val.getFullYear(), m = String(val.getMonth()+1).padStart(2,'0'), d = String(val.getDate()).padStart(2,'0');
    return `${y}-${m}-${d}`;
  }
  return String(val).slice(0, 10);
}

// ===================== MAPPERS SUPABASE → DOMINIO =====================
function mapPac(p) {
  return {
    id: String(p.id||''), nombre: String(p.nombre||''), dni: String(p.dni||''),
    tel: String(p.tel||''), codigo: String(p.codigo||''), sexo: String(p.sexo||''),
    fechaNacimiento: parseFechaSB(p.fecha_nacimiento),
    consentimiento: p.consentimiento === true || p.consentimiento === 'true',
    estado: String(p.estado||'Activo')
  };
}
function mapDisp(d) {
  // Normalizar tipo: puede venir como clave 'T1' o como nombre 'Marcapasos'
  let tipoNorm = String(d.tipo||'');
  if (tipoNorm && !TIPOS[tipoNorm]) {
    // Intentar encontrar por nombre (ej: 'Marcapasos' → 'T1')
    const found = Object.keys(TIPOS).find(k => TIPOS[k].nombre === tipoNorm);
    if (found) tipoNorm = found;
  }
  return {
    id: String(d.id||''), pacienteId: String(d.paciente_id||''), tipo: tipoNorm,
    marca: String(d.marca||''), modelo: String(d.modelo||''), serie: String(d.serie||''),
    subtipo: String(d.subtipo||''), fechaImplante: parseFechaSB(d.fecha_implante),
    motivoImplante: String(d.motivo_implante||''),
    activo: d.activo !== false, fechaRecambio: parseFechaSB(d.fecha_recambio)
  };
}
function mapCtrl(c) {
  return {
    id: String(c.id||''), pacienteId: String(c.paciente_id||''),
    dispositivoId: String(c.dispositivo_id||''), profesionalId: String(c.profesional_id||''),
    fechaProgramada: parseFechaSB(c.fecha_programada), fechaControl: parseFechaSB(c.fecha_control),
    proxControl: parseFechaSB(c.prox_control), proxMeses: Number(c.prox_meses||6),
    bateriaAnios: String(c.bateria_anios||''), bateriaMeses: String(c.bateria_meses||''),
    eriProximo: String(c.eri_proximo||'No'), parametrosTecnicos: c.parametros_tecnicos||{},
    fase: c.fase||null, indicaciones: String(c.indicaciones||''),
    riesgoManual: c.riesgo_manual === true, fechaCarga: c.fecha_carga ? String(c.fecha_carga) : ''
  };
}
function mapTurno(t) {
  return {
    pacienteId: String(t.paciente_id||''), fecha: parseFechaSB(t.fecha),
    hora: String(t.hora||''), controlId: String(t.control_id||''),
    profesionalId: String(t.profesional_id||''), origen: String(t.origen||'presencial')
  };
}
function mapAccion(a) {
  return { controlId: String(a.control_id||''), tipo: String(a.tipo||''), resultado: String(a.resultado||''), fecha: a.fecha||'' };
}

// ===================== CARGA INICIAL =====================
async function cargarDataset() {
  const [pr,pa,di,co,tu,ac,cfg,cnt] = await Promise.all([
    sbGet('profesionales'), sbGet('pacientes'), sbGet('dispositivos'), sbGet('controles'),
    sbGet('turnos_reservados'), sbGet('acciones_contacto'), sbGet('config_general'), sbGet('contadores')
  ]);
  profesionales = (pr||[]).map(p => ({ id:String(p.id||''), nombre:String(p.nombre||''), dni:String(p.dni||'') }));
  pacientes     = (pa||[]).map(mapPac);
  dispositivos  = (di||[]).map(mapDisp);
  controles     = (co||[]).map(mapCtrl);
  turnosReservados  = (tu||[]).map(mapTurno);
  accionesContacto  = (ac||[]).map(mapAccion);
  (cfg||[]).forEach(row => {
    const v = row.valor;
    if (row.clave === 'MARCAS_DISPOSITIVOS')    MARCAS_DISPOSITIVOS   = Array.isArray(v) ? v : JSON.parse(v);
    else if (row.clave === 'MOTIVOS_IMPLANTE')  MOTIVOS_IMPLANTE      = Array.isArray(v) ? v : JSON.parse(v);
    else if (row.clave === 'AGENDA_CONFIG')     AGENDA_CONFIG         = (typeof v === 'object' && !Array.isArray(v)) ? v : JSON.parse(v);
    else if (row.clave === 'CONFIG_INSTITUCION') CONFIG_INSTITUCION   = (typeof v === 'object' && !Array.isArray(v)) ? v : JSON.parse(v);
    else if (row.clave === 'VENTANA_DIAS')       VENTANA_DIAS         = Number(v);
    else if (row.clave === 'HORIZONTE_TURNOS_DIAS') HORIZONTE_TURNOS_DIAS = Number(v);
    else if (row.clave === 'TURNOS_ONLINE_POR_DIA') TURNOS_ONLINE_POR_DIA = Number(v);
    else if (row.clave === 'FECHA_IMPLEMENTACION_STR') {
      FECHA_IMPLEMENTACION_STR = typeof v === 'string' ? v : String(v);
      FECHA_IMPLEMENTACION = parseLocalDate(FECHA_IMPLEMENTACION_STR);
    }
  });
  (cnt||[]).forEach(c => {
    if (c.clave === 'nextPacienteId')    nextPacienteId    = Number(c.valor);
    else if (c.clave === 'nextDispositivoId') nextDispositivoId = Number(c.valor);
    else if (c.clave === 'nextControlId')    nextControlId     = Number(c.valor);
    else if (c.clave === 'nextProfesionalId') nextProfesionalId = Number(c.valor);
    else if (c.clave === 'nextCodigoNum')    nextCodigoNum     = Number(c.valor);
  });
  if (!AGENDA_CONFIG.diasBloqueados) AGENDA_CONFIG.diasBloqueados = [];
}

// ===================== GENERADOR DE CÓDIGO =====================
function generarCodigo() {
  const c = 'MR-' + String(nextCodigoNum).padStart(4,'0');
  nextCodigoNum++;
  sbUpdate('contadores','clave=eq.nextCodigoNum',{valor:nextCodigoNum}).catch(e=>console.error('contador codigo:',e));
  return c;
}

// ===================== GUARDADO: PACIENTES =====================
async function guardarNuevoPaciente_(datos) {
  const id = 'P' + nextPacienteId; nextPacienteId++;
  await sbUpdate('contadores','clave=eq.nextPacienteId',{valor:nextPacienteId});
  const codigo = generarCodigo();
  const row = { id, nombre:datos.nombre, dni:datos.dni, tel:datos.tel||'', codigo,
    sexo:datos.sexo, fecha_nacimiento:datos.fechaNacimiento||null,
    consentimiento:!!datos.consentimiento, estado:datos.estado||'Activo' };
  await sbInsert('pacientes', row);
  pacientes.push(mapPac({...row, fecha_nacimiento: row.fecha_nacimiento}));
  return { id, codigo };
}
async function actualizarPaciente_(pacienteId, cambios) {
  const upd = {};
  if (cambios.nombre      !== undefined) upd.nombre         = cambios.nombre;
  if (cambios.dni         !== undefined) upd.dni            = cambios.dni;
  if (cambios.tel         !== undefined) upd.tel            = cambios.tel;
  if (cambios.sexo        !== undefined) upd.sexo           = cambios.sexo;
  if (cambios.fechaNacimiento !== undefined) upd.fecha_nacimiento = cambios.fechaNacimiento||null;
  if (cambios.consentimiento  !== undefined) upd.consentimiento  = !!cambios.consentimiento;
  if (cambios.estado      !== undefined) upd.estado         = cambios.estado;
  await sbUpdate('pacientes','id=eq.'+pacienteId, upd);
  const idx = pacientes.findIndex(p => p.id === pacienteId);
  if (idx >= 0) Object.assign(pacientes[idx], cambios);
}
async function eliminarPaciente_(id) {
  await sbDelete('controles','paciente_id=eq.'+id);
  await sbDelete('dispositivos','paciente_id=eq.'+id);
  await sbDelete('pacientes','id=eq.'+id);
  pacientes     = pacientes.filter(p => p.id !== id);
  dispositivos  = dispositivos.filter(d => d.pacienteId !== id);
  controles     = controles.filter(c => c.pacienteId !== id);
}

// ===================== GUARDADO: DISPOSITIVOS =====================
async function guardarNuevoDispositivo_(pacienteId, datos, esRecambio) {
  const id = 'D' + nextDispositivoId; nextDispositivoId++;
  await sbUpdate('contadores','clave=eq.nextDispositivoId',{valor:nextDispositivoId});
  if (esRecambio) {
    const activo = dispositivos.find(d => d.pacienteId === pacienteId && d.activo);
    if (activo) {
      await sbUpdate('dispositivos','id=eq.'+activo.id,{activo:false, fecha_recambio:datos.fechaImplante||null});
      activo.activo = false; activo.fechaRecambio = datos.fechaImplante||'';
    }
  }
  const row = { id, paciente_id:pacienteId, tipo:datos.tipo, marca:datos.marca,
    modelo:datos.modelo||'', serie:datos.serie||'', subtipo:datos.subtipo||'',
    fecha_implante:datos.fechaImplante||null, motivo_implante:datos.motivoImplante||'',
    activo:true, fecha_recambio:null };
  await sbInsert('dispositivos', row);
  dispositivos.push(mapDisp(row));
  return { id };
}
async function actualizarDispositivo_(dispositivoId, cambios) {
  const upd = {};
  if (cambios.tipo           !== undefined) upd.tipo           = cambios.tipo;
  if (cambios.marca          !== undefined) upd.marca          = cambios.marca;
  if (cambios.modelo         !== undefined) upd.modelo         = cambios.modelo;
  if (cambios.serie          !== undefined) upd.serie          = cambios.serie;
  if (cambios.subtipo        !== undefined) upd.subtipo        = cambios.subtipo;
  if (cambios.fechaImplante  !== undefined) upd.fecha_implante = cambios.fechaImplante||null;
  if (cambios.motivoImplante !== undefined) upd.motivo_implante= cambios.motivoImplante;
  await sbUpdate('dispositivos','id=eq.'+dispositivoId, upd);
  const idx = dispositivos.findIndex(d => d.id === dispositivoId);
  if (idx >= 0) Object.assign(dispositivos[idx], cambios);
}

// ===================== GUARDADO: DISPOSITIVOS (eliminar) =====================
async function eliminarDispositivo_(id) {
  await sbDelete('controles','dispositivo_id=eq.'+id);
  await sbDelete('dispositivos','id=eq.'+id);
  dispositivos = dispositivos.filter(d => d.id !== id);
  controles    = controles.filter(c => c.dispositivoId !== id);
}

// ===================== GUARDADO: CONTROLES =====================
async function guardarNuevoControl_(datos) {
  const id = 'C' + nextControlId; nextControlId++;
  await sbUpdate('contadores','clave=eq.nextControlId',{valor:nextControlId});
  const toD = v => { if (!v) return null; if (typeof v === 'string') return v.slice(0,10); if (v instanceof Date) return parseFechaSB(v); return null; };
  const row = { id,
    paciente_id: datos.pacienteId, dispositivo_id: datos.dispositivoId,
    profesional_id: datos.profesionalId||null,
    fecha_programada: toD(datos.fechaProgramada), fecha_control: toD(datos.fechaControl),
    prox_control: toD(datos.proxControl), prox_meses: datos.proxMeses||6,
    bateria_anios: datos.bateriaAnios||'', bateria_meses: datos.bateriaMeses||'',
    eri_proximo: datos.eriProximo||'No', parametros_tecnicos: datos.parametrosTecnicos||{},
    fase: datos.fase||null, indicaciones: datos.indicaciones||'',
    riesgo_manual: !!datos.riesgoManual,
    fecha_carga: new Date().toISOString()
  };
  await sbInsert('controles', row);
  controles.push(mapCtrl(row));
  return { id };
}
async function actualizarControl_(controlId, cambios) {
  const toD = v => { if (!v) return null; if (typeof v === 'string') return v.slice(0,10); if (v instanceof Date) return parseFechaSB(v); return null; };
  const upd = {};
  if (cambios.fechaControl    !== undefined) upd.fecha_control     = toD(cambios.fechaControl);
  if (cambios.proxControl     !== undefined) upd.prox_control      = toD(cambios.proxControl);
  if (cambios.fechaProgramada !== undefined) upd.fecha_programada  = toD(cambios.fechaProgramada);
  if (cambios.proxMeses       !== undefined) upd.prox_meses        = cambios.proxMeses;
  if (cambios.bateriaAnios    !== undefined) upd.bateria_anios     = cambios.bateriaAnios;
  if (cambios.bateriaMeses    !== undefined) upd.bateria_meses     = cambios.bateriaMeses;
  if (cambios.eriProximo      !== undefined) upd.eri_proximo       = cambios.eriProximo;
  if (cambios.parametrosTecnicos !== undefined) upd.parametros_tecnicos = cambios.parametrosTecnicos;
  if (cambios.indicaciones    !== undefined) upd.indicaciones      = cambios.indicaciones;
  if (cambios.riesgoManual    !== undefined) upd.riesgo_manual     = !!cambios.riesgoManual;
  await sbUpdate('controles','id=eq.'+controlId, upd);
  const idx = controles.findIndex(c => c.id === controlId);
  if (idx >= 0) Object.assign(controles[idx], cambios);
}
async function eliminarControl_(id) {
  await sbDelete('acciones_contacto','control_id=eq.'+id);
  await sbDelete('turnos_reservados','control_id=eq.'+id);
  await sbDelete('controles','id=eq.'+id);
  controles        = controles.filter(c => c.id !== id);
  accionesContacto = accionesContacto.filter(a => a.controlId !== id);
  turnosReservados = turnosReservados.filter(t => t.controlId !== id);
}

// ===================== GUARDADO: TURNOS =====================
async function reservarTurno_(datos) {
  // datos.fecha debe ser string 'YYYY-MM-DD'
  const fechaStr = typeof datos.fecha === 'string' ? datos.fecha.slice(0,10) : parseFechaSB(datos.fecha);
  const existente = turnosReservados.find(t => t.fecha === fechaStr && t.hora === datos.hora);
  if (existente && existente.controlId !== datos.controlId) return { ok:false, error:'Ese horario ya está ocupado.' };
  // Eliminar turno anterior del mismo control
  const anterior = turnosReservados.find(t => t.controlId === datos.controlId && datos.controlId);
  if (anterior) {
    await sbDelete('turnos_reservados','control_id=eq.'+datos.controlId);
    turnosReservados = turnosReservados.filter(t => t.controlId !== datos.controlId);
  }
  const row = { paciente_id:datos.pacienteId, fecha:fechaStr, hora:datos.hora,
    control_id:datos.controlId||null, profesional_id:datos.profesionalId||null,
    origen:datos.origen||'presencial' };
  await sbInsert('turnos_reservados', row);
  turnosReservados.push({ pacienteId:datos.pacienteId, fecha:fechaStr, hora:datos.hora,
    controlId:datos.controlId||'', profesionalId:datos.profesionalId||'', origen:datos.origen||'presencial' });
  return { ok:true };
}
async function cancelarTurno_(pacienteId, fecha, hora) {
  const fechaStr = typeof fecha === 'string' ? fecha.slice(0,10) : parseFechaSB(fecha);
  await sbDelete('turnos_reservados',`paciente_id=eq.${pacienteId}&fecha=eq.${fechaStr}&hora=eq.${hora}`);
  turnosReservados = turnosReservados.filter(t => !(t.pacienteId===pacienteId && t.fecha===fechaStr && t.hora===hora));
}

// ===================== GUARDADO: ACCIONES DE CONTACTO =====================
async function registrarAccionContacto_(controlId, tipo, resultado) {
  await sbInsert('acciones_contacto',{ control_id:controlId, tipo, resultado });
  accionesContacto.push({ controlId, tipo, resultado, fecha:new Date().toISOString() });
}

// ===================== GUARDADO: PROFESIONALES =====================
async function guardarNuevoProfesional_(nombre, dni) {
  const id = 'PR' + nextProfesionalId; nextProfesionalId++;
  await sbUpdate('contadores','clave=eq.nextProfesionalId',{valor:nextProfesionalId});
  await sbInsert('profesionales',{ id, nombre, dni });
  profesionales.push({ id, nombre, dni });
  return { id };
}
async function actualizarProfesional_(profesionalId, nombre, dni) {
  await sbUpdate('profesionales','id=eq.'+profesionalId,{ nombre, dni });
  const idx = profesionales.findIndex(p => p.id === profesionalId);
  if (idx >= 0) Object.assign(profesionales[idx],{ nombre, dni });
}
async function eliminarProfesional_(id) {
  await sbDelete('profesionales','id=eq.'+id);
  profesionales = profesionales.filter(p => p.id !== id);
}

// ===================== GUARDADO: CONFIGURACIÓN =====================
async function guardarConfig_(clave, valor) {
  // Serializar objetos y arrays a JSON string para compatibilidad con Supabase text
  const valorSerial = (typeof valor === 'object') ? JSON.stringify(valor) : valor;
  await sbUpdate('config_general','clave=eq.'+clave,{ valor: valorSerial });
}

// ===================== FUNCIONES DE SESIÓN =====================
function iniciarSesion(prof) {
  profesionalLogueado = prof;
  document.getElementById('header-user').style.display = 'flex';
  document.getElementById('user-pill-text').textContent = prof.nombre.split(',')[0];
  document.getElementById('body-login').style.display = 'none';
  document.getElementById('body-personal').style.display = 'flex';
  renderDash();
}
function cerrarSesion() {
  profesionalLogueado = null;
  document.getElementById('header-user').style.display = 'none';
  document.getElementById('body-personal').style.display = 'none';
  document.getElementById('body-paciente').style.display = 'none';
  document.getElementById('body-login').style.display = 'flex';
  document.getElementById('login-dni').value = '';
  document.getElementById('login-msg').style.display = 'none';
}

// ===================== HELPERS DE DOMINIO =====================
function calcularEdad(fechaNacimiento) {
  if (!fechaNacimiento) return null;
  const hoy = new Date();
  const nac = parseLocalDate(fechaNacimiento);
  let edad = hoy.getFullYear() - nac.getFullYear();
  if (hoy.getMonth() < nac.getMonth() || (hoy.getMonth()===nac.getMonth() && hoy.getDate()<nac.getDate())) edad--;
  return edad;
}

function fmtDate(d) {
  if (!d) return '-';
  // Si es string tipo "YYYY-MM-DD", parsear como fecha local para evitar bug UTC
  if (typeof d === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(d)) {
    const [y,m,dd] = d.split('-');
    d = new Date(+y, +m-1, +dd);
  }
  return new Date(d).toLocaleDateString('es-AR');
}
function _parseFmt(d) {
  // Parsear siempre como fecha local para evitar bug UTC
  // IMPORTANTE: siempre devuelve una COPIA para no mutar el original
  if (!d) return new Date();
  if (typeof d === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(d)) {
    const [y,m,dd] = d.split('-'); return new Date(+y, +m-1, +dd);
  }
  if (d instanceof Date) return new Date(d.getTime()); // COPIA, no referencia
  return new Date(d);
}
function fmtMesAnio(d) {
  const s = _parseFmt(d).toLocaleDateString('es-AR', {month:'long', year:'numeric'});
  return s.charAt(0).toUpperCase() + s.slice(1);
}
function fmtDateLong(d) {
  const s = _parseFmt(d).toLocaleDateString('es-AR', {weekday:'long', day:'2-digit', month:'2-digit'});
  return s.charAt(0).toUpperCase() + s.slice(1);
}
function fmtDateTime(d) {
  return _parseFmt(d).toLocaleString('es-AR', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'});
}
function fmtDateShort(d) { return _parseFmt(d).toLocaleDateString('es-AR', {day:'2-digit', month:'2-digit'}); }
function diasRestantes(fecha) {
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  let f;
  if (typeof fecha === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(fecha)) {
    const [y,m,d] = fecha.split('-');
    f = new Date(+y, +m-1, +d);
  } else {
    f = _parseFmt(fecha);
  }
  f.setHours(0,0,0,0);
  return Math.round((f.getTime() - hoy.getTime()) / 86400000);
}
function toInputDate(d) {
  if (!d) return '';
  // Si ya es string YYYY-MM-DD, devolver directo (evita bug UTC)
  if (typeof d === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(d)) return d;
  // Si es Date local, formatear sin conversión UTC
  if (d instanceof Date) {
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${dd}`;
  }
  // Fallback: string con hora, tomar solo la fecha
  return String(d).slice(0,10);
}
function addMonths(date, months) {
  const d = _parseFmt(date); // evitar bug UTC
  const dia = d.getDate();
  d.setDate(1); // ir al día 1 para evitar overflow
  d.setMonth(d.getMonth() + months);
  // Restaurar el día sin overflow (ej: 31 ene + 1 mes → último día de feb)
  const maxDia = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
  d.setDate(Math.min(dia, maxDia));
  return d;
}

function getPerfilDispositivo(disp) {
  if (!disp) return null;
  if (disp.tipo === 'T3') return 'T3';
  if (disp.tipo === 'T4') return 'T4';
  const key = `${disp.tipo}-${disp.subtipo||''}`;
  if (PARAMS_POR_PERFIL[key]) return key;
  // Sin subtipo: devolver clave especial con unión de todos los perfiles del tipo
  return `${disp.tipo}-*`;
}

function getParamsParaPerfil(perfil) {
  if (!perfil) return [];
  if (PARAMS_POR_PERFIL[perfil]) return PARAMS_POR_PERFIL[perfil];
  // Clave con wildcard: unión de todos los perfiles del tipo
  const tipo = perfil.replace('-*','');
  const todos = Object.entries(PARAMS_POR_PERFIL)
    .filter(([k]) => k.startsWith(tipo+'-'))
    .flatMap(([,v]) => v);
  return [...new Set(todos)]; // sin duplicados, orden de inserción
}

function calcularRetrasoDias(c) {
  if (!c.fechaProgramada || !c.fechaControl) return 0;
  const prog = _parseFmt(c.fechaProgramada);
  const real = _parseFmt(c.fechaControl);
  prog.setHours(0,0,0,0); real.setHours(0,0,0,0);
  return Math.round((real.getTime() - prog.getTime()) / 86400000);
}

function esAdherente(c) {
  const dias = calcularRetrasoDias(c);
  return dias <= 30; // anticipación siempre adherente; solo penaliza retraso >30 días
}

function calcularRetrasoAjustado(c) {
  const dias = calcularRetrasoDias(c);
  return dias <= 0 ? 0 : (dias <= 30 ? 0 : dias); // anticipación=0, ≤30=0, >30=valor real
}

function esSeguimientoPerdido(c) {
  return calcularRetrasoDias(c) >= 180;
}

function calcularRetrasoMeses(c) {
  if (!c.fechaProgramada || !c.fechaControl) return 0;
  const prog = _parseFmt(c.fechaProgramada);
  const real = _parseFmt(c.fechaControl);
  const meses = (real.getFullYear()-prog.getFullYear())*12 + (real.getMonth()-prog.getMonth());
  return Math.max(0, meses);
}

function vidaBateriaMeses(c) {
  const anios = c.bateriaAnios !== '' && c.bateriaAnios !== null && c.bateriaAnios !== undefined ? parseInt(c.bateriaAnios) : null;
  const meses = c.bateriaMeses !== '' && c.bateriaMeses !== null && c.bateriaMeses !== undefined ? parseInt(c.bateriaMeses) : null;
  if (anios === null && meses === null) return null;
  return (anios||0)*12 + (meses||0);
}

function eriMenorUnAnio(c) {
  // ERI = vida restante estimada a hoy <= 0 (ya entró en ERI)
  // "Menor un año" = menos de 12 meses restantes estimados hoy
  const mesesHoy = vidaBateriaEstimadaHoy(c);
  if (mesesHoy === null) return c.eriProximo === 'Sí';
  return mesesHoy < 12;
}

function fmtVidaBateria(c) {
  const anios = parseInt(c.bateriaAnios)||0;
  const meses = parseInt(c.bateriaMeses)||0;
  if (!anios && !meses) return '-';
  const partes = [];
  if (anios) partes.push(`${anios} ${anios===1?'año':'años'}`);
  if (meses) partes.push(`${meses} ${meses===1?'mes':'meses'}`);
  return partes.join(' y ');
}

function vidaBateriaEstimadaHoy(c) {
  const totalMeses = vidaBateriaMeses(c);
  if (!totalMeses) return null;
  const fechaControl = typeof c.fechaControl === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(c.fechaControl)
    ? (() => { const [y,m,d] = c.fechaControl.split('-'); return new Date(+y,+m-1,+d); })()
    : _parseFmt(c.fechaControl);
  const hoy = new Date();
  const mesesTranscurridos = (hoy.getFullYear() - fechaControl.getFullYear()) * 12 + (hoy.getMonth() - fechaControl.getMonth());
  return Math.max(0, totalMeses - mesesTranscurridos);
}

function calcularFase(c) {
  if (c.fase) return c.fase;
  const _fc = _parseFmt(c.fechaControl);
  return _fc < FECHA_IMPLEMENTACION ? 'Retrospectivo' : 'Prospectivo';
}

}

/* ===================== CONTROLES PENDIENTES (no realizados) ===================== */
function getControlesPendientes() {
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const pendientes = [];

  pacientes.forEach(pac => {
    if (pac.estado !== 'Activo') return; // No generar pendientes para trasladados, fallecidos, etc.
    const controlesPaciente = controles.filter(c=>c.pacienteId===pac.id);
    if (controlesPaciente.length === 0) return;

    const ultimo = controlesPaciente.reduce((a,b) => diasRestantes(a.fechaControl) > diasRestantes(b.fechaControl) ? a : b);
    const proxFecha = _parseFmt(ultimo.proxControl);

    if (proxFecha < hoy) {
      const diasAtraso = -diasRestantes(proxFecha);
      const disp = dispositivos.find(d=>d.id===ultimo.dispositivoId);
      pendientes.push({
        paciente: pac,
        dispositivo: disp,
        ultimoControl: ultimo,
        fechaProgramada: proxFecha,
        diasAtraso,
        seguimientoPerdido: diasAtraso >= 180,
        fase: proxFecha < FECHA_IMPLEMENTACION ? 'Retrospectivo' : 'Prospectivo'
      });
    }
  });

  return pendientes.sort((a,b)=>b.diasAtraso - a.diasAtraso);
}
function getRecuperacionSeguimiento() {
  const pacientesIds = [...new Set(controles.map(c=>c.pacienteId))];
  const pendientes = getControlesPendientes();

  return pacientesIds.map(pid => {
    const pac = pacientes.find(p=>p.id===pid);
    const controlesPaciente = controles.filter(c=>c.pacienteId===pid);
    const pendientePaciente = pendientes.find(p=>p.paciente.id===pid);

    const perdidoPreControles = controlesPaciente.some(c => calcularFase(c)==='Retrospectivo' && esSeguimientoPerdido(c));
    const perdidoPrePendiente = pendientePaciente && pendientePaciente.seguimientoPerdido && pendientePaciente.fase === 'Retrospectivo';
    const perdidoPre = perdidoPreControles || perdidoPrePendiente;

    const tieneControlPost = controlesPaciente.some(c => calcularFase(c)==='Prospectivo');
    return {
      paciente: pac,
      perdidoPre,
      tieneControlPost,
      recuperado: perdidoPre && tieneControlPost
    };
  }).filter(r => r.perdidoPre);
}

function calcularRiesgo(c) {
  // Priorizar dispositivo activo del paciente para determinar el tipo actual
  const dispActivo = dispositivos.find(d=>d.pacienteId===c.pacienteId && d.activo);
  const dispControl = dispositivos.find(d=>d.id===c.dispositivoId);
  const disp = dispActivo || dispControl || {};
  const retraso = calcularRetrasoMeses(c);
  // También considerar si el próximo control lleva mucho tiempo vencido (paciente pendiente)
  const diasVencido = -diasRestantes(c.proxControl); // positivo si está vencido
  const mesesVencido = Math.floor(diasVencido / 30);
  const motivos = [];
  if (retraso >= 2) motivos.push(`Retraso de control ≥ 2 meses (${retraso} meses)`);
  if (mesesVencido >= 2) motivos.push(`Sin control hace ≥ 2 meses (${mesesVencido} meses vencido)`);
  if (eriMenorUnAnio(c)) motivos.push('Batería próxima a ERI (< 1 año)');
  const tipoCDI = disp.tipo === 'T2' || disp.tipo === 'T4' ||
    disp.tipo === 'CDI' || disp.tipo === 'CDI+TRC';
  if (tipoCDI) motivos.push('Portador de CDI');
  if (c.riesgoManual) motivos.push('Criterio del equipo tratante');
  return {alto: motivos.length > 0, motivos};
}

function renderDash() {
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const view = document.getElementById('view-dash');

  const recordatorios = [];  // proxControl ≤7 días, sin turno
  const enVentana = [];      // proxControl vencido hace ≤30 días, sin control ni turno
  const conTurno = [];       // tienen turno asignado
  const vencidos = [];       // vencido hace >30 días, sin control
  const proximos = [];       // proxControl >7 días, sin turno

  // Por cada paciente activo, tomar solo el control más reciente
  const pacientesActivos = pacientes.filter(p => p.estado === 'Activo');
  pacientesActivos.forEach(pac => {
    const controlesPac = controles.filter(c => c.pacienteId === pac.id);
    if (controlesPac.length === 0) return;
    // Tomar el control con fechaControl más reciente
    const c = controlesPac.reduce((mas, c2) => {
      const d1 = _parseFmt(mas.fechaControl);
      const d2 = _parseFmt(c2.fechaControl);
      return d2 > d1 ? c2 : mas;
    });
    // Ignorar si la fecha del control es futura
    const fechaCtrl = _parseFmt(c.fechaControl);
    fechaCtrl.setHours(0,0,0,0);
    if (fechaCtrl > hoy) return;

    const dias = diasRestantes(c.proxControl);
    const riesgo = calcularRiesgo(c);
    const turno = turnosReservados.find(t=>t.controlId===c.id);
    const accion = accionesContacto.filter(ac=>ac.controlId===c.id).slice(-1)[0];
    const entry = {control:c, paciente:pac, profesional:profesionales.find(p=>p.id===c.profesionalId), riesgo, turno, accion, dias};

    if (turno) {
      conTurno.push(entry);
    } else if (dias < 0 && Math.abs(dias) <= 30) {
      enVentana.push(entry);
    } else if (dias < 0 && Math.abs(dias) > 30) {
      vencidos.push(entry);
    } else if (dias <= 7) {
      recordatorios.push(entry);
    } else {
      proximos.push(entry);
    }
  });

  recordatorios.sort((a,b)=>a.dias-b.dias);
  enVentana.sort((a,b)=>a.dias-b.dias);
  vencidos.sort((a,b)=>a.dias-b.dias);
  proximos.sort((a,b)=>a.dias-b.dias);
  conTurno.sort((a,b)=>{ const fa=toInputDate(a.turno.fecha); const fb=toInputDate(b.turno.fecha); return fa<fb?-1:fa>fb?1:0; });

  // Stats
  let html = `

      <div class="stat-card"><div class="stat-label">Controles vencidos</div><div class="stat-num">${vencidos.length}</div></div>
    </div>
  `;

  // ===== SECCIÓN 1: Recordatorios esta semana =====
  html += `<div class="section-label" style="display:flex; align-items:center; gap:8px;">

    Próximos controles
    <span style="font-size:11px; color:var(--mr-text-muted); font-weight:400;">— en más de 7 días, sin acción requerida aún</span>
  </div>`;

async function registrarAccion(controlId, tipo, resultado) {
  await registrarAccionContacto_(controlId, tipo, resultado);
  renderDash();
}

async function openModalAccion(controlId, tipo) {
  const overlay = document.getElementById('modal-overlay');
  const content = document.getElementById('modal-content');
  overlay.classList.add('show');

  const control = controles.find(c=>c.id===controlId);
  const pac = control ? pacientes.find(p=>p.id===control.pacienteId) : null;

  // Generar opciones de turno (próximos 21 días)
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const finHorizonte = new Date(hoy.getTime() + HORIZONTE_TURNOS_DIAS*86400000);
  const opciones = [];
  for (let d = new Date(hoy); d <= finHorizonte; d.setDate(d.getDate()+1)) {
    if (AGENDA_CONFIG.diasAtencion.includes(d.getDay()) && !AGENDA_CONFIG.diasBloqueados.includes(toInputDate(d))) {
      const fecha = new Date(d);
      const libres = AGENDA_CONFIG.horarios.filter(h => !turnosReservados.some(t => toInputDate(t.fecha)===toInputDate(fecha) && t.hora===h));
      if (libres.length > 0) opciones.push({fecha, libres});
    }
  }

  let turnoOptsHTML = `<option value="">Sin asignar turno ahora</option>`;
  opciones.forEach(op => {
    op.libres.forEach(h => {
      turnoOptsHTML += `<option value="${toInputDate(op.fecha)}|${h}">${fmtDateLong(op.fecha)} · ${h} hs</option>`;
    });
  });

  content.innerHTML = `
    <h3>Registrar llamado</h3>
    ${pac ? `<div style="font-size:13px; color:var(--mr-text-muted); margin-bottom:1rem;">Paciente: <strong>${pac.nombre}</strong></div>` : ''}
    <div class="field">
      <label>Resultado del contacto</label>
      <select id="acc-resultado">
        <option value="Contactado, turno asignado">Contactado, turno asignado</option>
        <option value="Contactado, sin turno">Contactado, sin turno</option>
        <option value="No contactado">No contactado</option>
      </select>
    </div>
    <div class="field" id="acc-turno-field">
      <label>Asignar turno (opcional)</label>
      ${opciones.length > 0
        ? `<select id="acc-turno">${turnoOptsHTML}</select>`
        : `<div style="font-size:13px; color:var(--mr-text-muted); padding:8px 0;">No hay turnos disponibles en los próximos 21 días.</div><input type="hidden" id="acc-turno" value="">`
      }
    </div>
    <div style="display:flex; gap:8px;">
      <button id="acc-guardar" class="btn-primary">Guardar</button>
      <button id="acc-cancelar" class="btn-secondary">Cancelar</button>
    </div>
  `;

  // Ocultar turno si resultado es "No contactado"
  document.getElementById('acc-resultado').addEventListener('change', (e) => {
    document.getElementById('acc-turno-field').style.display = e.target.value === 'No contactado' ? 'none' : 'block';
  });

  document.getElementById('acc-cancelar').addEventListener('click', closeModal);
  document.getElementById('acc-guardar').addEventListener('click', async () => {
    const resultado = document.getElementById('acc-resultado').value;
    const turnoVal = document.getElementById('acc-turno').value;
    if (turnoVal) {
      const [fechaStr, hora] = turnoVal.split('|');
      // Cancelar turno anterior si existe
      const turnoAnterior = turnosReservados.find(t => t.controlId === controlId);
      if (turnoAnterior) await cancelarTurno_(control.pacienteId, turnoAnterior.fecha, turnoAnterior.hora);
      // Reservar nuevo turno en Supabase
      await reservarTurno_({pacienteId: control.pacienteId, fecha: fechaStr, hora, controlId, origen: 'presencial'});
    }
    registrarAccion(controlId, tipo, resultado);
    closeModal();
  });
}

function getFechasAtencion(cant) {
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const fechas = [];
  for (let d = new Date(hoy), i=0; fechas.length < cant && i < 60; d.setDate(d.getDate()+1), i++) {
    if (AGENDA_CONFIG.diasAtencion.includes(d.getDay()) && !AGENDA_CONFIG.diasBloqueados.includes(toInputDate(d))) {
      fechas.push(new Date(d));
    }
  }
  return fechas;
}

            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>

function getFechasAtencionConBloqueados(cant) {
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const fechas = [];
  for (let d = new Date(hoy), i=0; fechas.length < cant && i < 60; d.setDate(d.getDate()+1), i++) {
    if (AGENDA_CONFIG.diasAtencion.includes(d.getDay())) fechas.push(new Date(d));
  }
  return fechas;
}

function openModalAsignarTurno(fechaStr, hora) {
  const overlay = document.getElementById('modal-overlay');
  const content = document.getElementById('modal-content');
  overlay.classList.add('show');
  content.style.maxWidth = '400px';
  const [y,m,d] = fechaStr.split('-');
  const fecha = new Date(+y,+m-1,+d);
  content.innerHTML = `
    <h3>Asignar turno</h3>
    <div style="font-size:13px; color:var(--mr-text-muted); margin-bottom:1rem;">
      ${fmtDateLong(fecha)} · ${hora} hs
    </div>
    <div class="field">
      <label>Paciente</label>
      <div class="field-row">
        ${pacienteSelectorHTML('at-paciente','dl-at-paciente')}
        <button id="at-nuevo-pac" class="icon-btn" aria-label="Nuevo paciente" title="Nuevo paciente">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
    </div>
    <div id="at-msg" class="msg err" style="display:none;"></div>
    <div style="display:flex; gap:8px;">
      <button id="at-guardar" class="btn-primary">Asignar</button>
      <button id="at-cancelar" class="btn-secondary">Cancelar</button>
    </div>
  `;
  bindPacienteSelector('at-paciente');
  document.getElementById('at-nuevo-pac').addEventListener('click', () => {
    openModalPacienteSimple((nuevo) => {
      openModalAsignarTurno(fechaStr, hora);
      setTimeout(() => setPacienteSelector('at-paciente', nuevo.id), 50);
    });
  });
  document.getElementById('at-cancelar').addEventListener('click', () => {
    content.style.maxWidth = '';
    closeModal();
  });
  document.getElementById('at-guardar').addEventListener('click', async () => {
    const pacienteId = getPacienteSelector('at-paciente');
    const msg = document.getElementById('at-msg');
    if (!pacienteId) { msg.style.display='block'; msg.textContent='Seleccioná un paciente.'; return; }
    // Verificar que no haya otro turno en ese horario
    if (turnosReservados.some(t => toInputDate(t.fecha)===fechaStr && t.hora===hora)) {
      msg.style.display='block'; msg.textContent='Ese horario ya está ocupado.'; return;
    }
    const controlActivo = controles.filter(c=>c.pacienteId===pacienteId).sort((a,b)=>diasRestantes(a.fechaControl)-diasRestantes(b.fechaControl))[0];
    const _rAT = await reservarTurno_({pacienteId, fecha:fechaStr, hora, controlId:controlActivo?.id||'', origen:'presencial'});
    if (!_rAT.ok) { msg.style.display='block'; msg.textContent=_rAT.error||'Horario ocupado.'; return; }
    content.style.maxWidth = '';
    closeModal();
    renderAgenda();
  });
}

function renderDiagramaOcupacion() {
  const cont = document.getElementById('diagrama-ocupacion');
  const fechasAtencion = getFechasAtencionConBloqueados(4);

  if (fechasAtencion.length === 0 || AGENDA_CONFIG.horarios.length === 0) {
    cont.innerHTML = `<div class="empty">Configurá días de atención y horarios para ver la ocupación</div>`;
    return;
  }

  let html = `<div style="display:grid; grid-template-columns: 48px repeat(${fechasAtencion.length}, 1fr); gap:4px; align-items:center;">`;

  html += `<div></div>`;
  fechasAtencion.forEach(f => {
    const bloqueado = AGENDA_CONFIG.diasBloqueados.includes(toInputDate(f));
    html += `<div style="text-align:center; font-size:12px; font-weight:700; ${bloqueado?'color:var(--mr-coral);':''}">${fmtDateShort(f)}<div style="font-size:11px; color:${bloqueado?'var(--mr-coral)':'var(--mr-text-muted)'}; font-weight:400; text-transform:capitalize;">${DIAS_SEMANA_CORTOS[f.getDay()]}${bloqueado?' 🔒':''}</div></div>`;
  });

  AGENDA_CONFIG.horarios.forEach(h => {
    html += `<div style="font-size:12px; color:var(--mr-text-muted); text-align:right; padding-right:6px;">${h}</div>`;
    fechasAtencion.forEach(f => {
      const bloqueado = AGENDA_CONFIG.diasBloqueados.includes(toInputDate(f));
      if (bloqueado) {
        html += `<div style="border-radius:var(--border-radius-md); padding:6px 4px; text-align:center; font-size:11px; background:var(--mr-coral-bg); color:var(--mr-coral-text); font-weight:500;">Bloqueado</div>`;
      } else {
        const turno = turnosReservados.find(t => toInputDate(t.fecha)===toInputDate(f) && t.hora===h);
        if (turno) {
          const pac = pacientes.find(p=>p.id===turno.pacienteId);
          const disp = dispositivos.find(d=>d.pacienteId===turno.pacienteId && d.activo);
          const nombre = pac ? pac.nombre.split(',')[0] : '?';
          const marca = disp ? disp.marca : '';
          const esOnline = turno.origen === 'online';
          const cls = esOnline ? 'occ-cell occ-online' : 'occ-cell occ-taken';
          html += `<div class="${cls}" title="${pac ? pac.nombre : ''}${esOnline ? ' · Reservado online' : ' · Presencial'}" style="cursor:pointer; white-space:normal; line-height:1.3;" onclick="openModalPacienteAgenda('${turno.pacienteId}')">
            <div style="font-weight:700; font-size:11px;">${nombre}</div>
            ${marca ? `<div style="font-size:10px; opacity:0.8;">${marca}</div>` : ''}
          </div>`;
        } else {
          html += `<div class="occ-cell occ-free" style="cursor:pointer;" onclick="openModalAsignarTurno('${toInputDate(f)}','${h}')" title="Asignar turno">+</div>`;
        }
      }
    });
  });

  html += `</div>`;

  html += `
    <div style="display:flex; gap:16px; margin-top:12px; font-size:12px; color:var(--mr-text-muted);">
      <div style="display:flex; align-items:center; gap:6px;"><span style="display:inline-block; width:14px; height:14px; border-radius:4px; background:var(--mr-coral-bg);"></span>Presencial</div>
      <div style="display:flex; align-items:center; gap:6px;"><span style="display:inline-block; width:14px; height:14px; border-radius:4px; background:#E6F1FB;"></span>Online</div>
      <div style="display:flex; align-items:center; gap:6px;"><span style="display:inline-block; width:14px; height:14px; border-radius:4px; border:0.5px solid var(--mr-border);"></span>Libre</div>
      <div style="display:flex; align-items:center; gap:6px;"><span style="display:inline-block; width:14px; height:14px; border-radius:4px; background:var(--mr-coral-bg); border:1px solid var(--mr-coral);"></span>Bloqueado</div>
    </div>
  `;

  cont.innerHTML = html;
}

        <div class="field">

          <input type="date" id="f-fechacontrol">
        </div>

          <label>Próximo control (meses)</label>

      <div id="f-msg" class="msg"></div>
    </div>
  </div>`;

  document.getElementById('f-fechacontrol').value = modoEdicion ? toInputDate(editando.fechaControl) : toInputDate(new Date());
  if (modoEdicion) {
    document.getElementById('f-proxmeses').value = editando.proxMeses || 6;
    document.getElementById('f-bateria-anios').value = editando.bateriaAnios || '';
    document.getElementById('f-bateria-meses').value = editando.bateriaMeses || '';
    document.getElementById('f-indicaciones').value = editando.indicaciones || '';
    document.getElementById('f-riesgo-manual').checked = !!editando.riesgoManual;
    if (editando.parametrosTecnicos) parametrosTecnicosTemp = {...editando.parametrosTecnicos};
  }

  function updatePreview() {
    const fechaControlVal = document.getElementById('f-fechacontrol').value;
    const meses = parseInt(document.getElementById('f-proxmeses').value) || 0;
    const fechaControl = fechaControlVal ? parseLocalDate(fechaControlVal) : new Date();
    const prox = addMonths(fechaControl, meses);
    document.getElementById('f-preview').innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Próximo control: <strong>${fmtMesAnio(prox)}</strong> (${meses} ${meses===1?'mes':'meses'} desde la fecha de control)`;
  }
  document.getElementById('f-fechacontrol').addEventListener('change', updatePreview);
  document.getElementById('f-proxmeses').addEventListener('input', updatePreview);

  function updateVidaPreview() {
    const anios = parseInt(document.getElementById('f-bateria-anios')?.value)||0;
    const meses = parseInt(document.getElementById('f-bateria-meses')?.value)||0;
    const preview = document.getElementById('f-vida-preview');
    if (!preview) return;
    const total = anios*12 + meses;
    preview.innerHTML = total ? `Total: <strong>${total} ${total===1?'mes':'meses'}</strong> hasta ERI` : '';
  }
  document.getElementById('f-bateria-anios').addEventListener('input', updateVidaPreview);
  document.getElementById('f-bateria-meses').addEventListener('input', updateVidaPreview);
  if (modoEdicion) updateVidaPreview();
  updatePreview();

  bindPacienteSelector('f-paciente');

  // En modo edición: pre-cargar paciente, bloquearlo y disparar actualización de dispositivo
  if (modoEdicion) {
    setPacienteSelector('f-paciente', editando.pacienteId);
    document.getElementById('f-paciente').readOnly = true;
    document.getElementById('f-paciente').style.background = 'var(--mr-bg)';
    document.getElementById('f-paciente').style.color = 'var(--mr-text-muted)';
  }

  // Llamar inmediatamente por si ya hay valor pre-cargado
  actualizarDispositivoActivo();

  function actualizarDispositivoActivo() {
    const pacienteId = getPacienteSelector('f-paciente');
    const disp = pacienteId ? getDispositivoActivo(pacienteId) : null;
    const display = document.getElementById('f-dispositivo-display');
    const hidden = document.getElementById('f-dispositivo');
    const btnParams = document.getElementById('f-btn-params');
    const dispExtra = document.getElementById('f-disp-extra');
    const subtipoField = document.getElementById('f-subtipo-field');
    const subtipoSel = document.getElementById('f-subtipo');
    const fechaImplanteInput = document.getElementById('f-fecha-implante');

    if (disp) {
      const tipo = TIPOS[disp.tipo] || {nombre: disp.tipo||'Dispositivo', lapso:12};
      display.textContent = `${tipo.nombre}${disp.subtipo ? ' · '+disp.subtipo : ''} · ${disp.marca}${disp.modelo ? ' · '+disp.modelo : ''}`;
      display.style.color = 'var(--color-text-primary)';
      hidden.value = disp.id;

      // Mostrar bloque extra
      dispExtra.style.display = 'block';

      // Subtipo
      const opcionesSubtipo = {
        T1: ['Unicameral (A)', 'Unicameral (V)', 'Bicameral'],
        T2: ['Unicameral', 'Bicameral', 'Subcutáneo']
      };
      if (opcionesSubtipo[disp.tipo]) {
        subtipoField.style.display = 'block';
        subtipoSel.innerHTML = `<option value="">— Sin especificar —</option>` +
          opcionesSubtipo[disp.tipo].map(o => `<option value="${o}" ${disp.subtipo===o?'selected':''}>${o}</option>`).join('');
        // Gris si ya tiene subtipo
        subtipoSel.style.background = disp.subtipo ? 'var(--mr-bg)' : '#fff';
        subtipoSel.style.color = disp.subtipo ? 'var(--mr-text-muted)' : '';
      } else {
        subtipoField.style.display = 'none';
      }

      // Fecha implante
      fechaImplanteInput.value = disp.fechaImplante || '';
      fechaImplanteInput.style.background = disp.fechaImplante ? 'var(--mr-bg)' : '#fff';
      fechaImplanteInput.style.color = disp.fechaImplante ? 'var(--mr-text-muted)' : '';

      // Motivo implante — regenerar selector con valor del dispositivo
      const motivoWrap = document.getElementById('f-motivo-implante-wrap');
      if (motivoWrap) {
        motivoWrap.innerHTML = motivoSelectorHTML('f-motivo-implante', disp.motivoImplante || '');
        bindMotivoSelector('f-motivo-implante');
        const motivoSel = document.getElementById('f-motivo-implante');
        if (motivoSel && disp.motivoImplante) {
          motivoSel.disabled = true;
          motivoSel.style.background = 'var(--mr-bg)';
          motivoSel.style.color = 'var(--mr-text-muted)';
        }
      }

      const btnNuevoDisp = document.getElementById('f-btn-nuevo-disp');
      if (btnNuevoDisp) btnNuevoDisp.style.display = 'none';

      const perfil = getPerfilDispositivo(disp);
      btnParams.style.display = perfil ? 'inline-flex' : 'none';

      // Botón control anterior
      const controlAnteriorDiv = document.getElementById('f-control-anterior');
      const ultimoControl = controles
        .filter(c => c.pacienteId === pacienteId)
        .sort((a,b) => diasRestantes(a.fechaControl) - diasRestantes(b.fechaControl))[0];
      if (controlAnteriorDiv) {
        if (ultimoControl) {
          controlAnteriorDiv.style.display = 'block';
          document.getElementById('f-btn-control-anterior').onclick = () => openModalResumenControl(ultimoControl.id);
        } else {
          controlAnteriorDiv.style.display = 'none';
        }
      }
    } else if (pacienteId) {
      display.textContent = 'Este paciente no tiene dispositivo activo';
      display.style.color = 'var(--mr-coral)';
      hidden.value = '';
      dispExtra.style.display = 'none';
      btnParams.style.display = 'none';
      const ca1 = document.getElementById('f-control-anterior'); if (ca1) ca1.style.display = 'none';
      const btnNuevoDisp = document.getElementById('f-btn-nuevo-disp');
      if (btnNuevoDisp) {
        btnNuevoDisp.style.display = 'flex';
        btnNuevoDisp.onclick = () => {
          openModalNuevoDispositivo(pacienteId, () => {
            document.getElementById('f-paciente').dispatchEvent(new Event('change'));
          });
        };
      }
    } else {
      display.textContent = 'Seleccioná un paciente para ver su dispositivo activo';
      display.style.color = 'var(--mr-text-muted)';
      hidden.value = '';
      dispExtra.style.display = 'none';
      btnParams.style.display = 'none';
      const ca2 = document.getElementById('f-control-anterior'); if (ca2) ca2.style.display = 'none';
      const bnd = document.getElementById('f-btn-nuevo-disp'); if (bnd) bnd.style.display = 'none';
    }
  }

  document.getElementById('f-paciente').addEventListener('input', actualizarDispositivoActivo);
  document.getElementById('f-paciente').addEventListener('change', actualizarDispositivoActivo);
  document.getElementById('f-btn-params').addEventListener('click', () => {
    const dispositivoId = document.getElementById('f-dispositivo').value;
    const disp = dispositivos.find(d=>d.id===dispositivoId);
    openModalParametrosTecnicos(disp);
  });


  document.getElementById('f-nuevo-paciente')?.addEventListener('click', () => {
    openModalPaciente((nuevo) => {
      // No llamar renderForm() — solo actualizar el selector para evitar doble listener
      setTimeout(() => {
        setPacienteSelector('f-paciente', nuevo.id);
        document.getElementById('f-paciente').dispatchEvent(new Event('change'));
      }, 50);
    });
  });

    // Cancelar listener anterior para evitar acumulación
  // Clonar el botón elimina TODOS los listeners anteriores
  const _oldBtn = document.getElementById('f-submit');
  const _newBtn = _oldBtn.cloneNode(true);
  _oldBtn.parentNode.replaceChild(_newBtn, _oldBtn);
  _newBtn.addEventListener('click', async () => {
    if (_submitRunning) return;
    _submitRunning = true;
    // Leer modo edición del DOM para evitar problemas de closure
    const _editandoId = document.getElementById('f-modo-edicion-id')?.value || '';
    const modoEdicion = !!_editandoId;
    const editando = _editandoId ? controles.find(c => c.id === _editandoId) : null;
    const fechaControlVal = document.getElementById('f-fechacontrol').value;
    const mesesVal = document.getElementById('f-proxmeses').value;
    const msg = document.getElementById('f-msg');

    if (!fechaControlVal || !mesesVal || parseInt(mesesVal) < 1) {
      msg.className = 'msg err';
      msg.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Completá la fecha del control y los meses para el próximo control (entero ≥ 1).`;
      return;
    }

    const pacienteId = getPacienteSelector('f-paciente');
    if (!pacienteId) {
      msg.className = 'msg err';
      msg.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Seleccioná un paciente válido de la lista.`;
      return;
    }

    const fechaControl = parseLocalDate(fechaControlVal);
    const meses = parseInt(mesesVal) || 0;
    const semanas = parseInt(document.getElementById('f-proxsemanas')?.value) || 0;
    const proxControl = addMonths(fechaControl, meses);
    const proxMesesTotal = meses + semanas * 0.5;

    const dispositivoId = document.getElementById('f-dispositivo').value;

    let controlGuardado;

    if (modoEdicion) {
      // Editar control existente
      // Normalizar fechas a string para consistencia con Supabase
      editando.fechaControl = toInputDate(fechaControl);
      editando.proxControl = toInputDate(proxControl);
      editando.proxMeses = meses;
      editando.bateriaAnios = document.getElementById('f-bateria-anios').value;
      editando.bateriaMeses = document.getElementById('f-bateria-meses').value;
      editando.indicaciones = document.getElementById('f-indicaciones').value;
      editando.riesgoManual = document.getElementById('f-riesgo-manual').checked;
      editando.parametrosTecnicos = {...parametrosTecnicosTemp};

      // Recalcular fechaProgramada: proxControl del control anterior, o fechaControl si es el primero
      const otrosControles = controles.filter(c => c.id !== editando.id && c.pacienteId === editando.pacienteId && c.dispositivoId === editando.dispositivoId);
      let nuevaFechaProgramada;
      if (otrosControles.length === 0) {
        // Es el único control — programada = realizada (retraso 0)
        nuevaFechaProgramada = editando.fechaControl;
      } else {
        // Tomar el proxControl del control anterior más reciente
        const anteriores = otrosControles
          .filter(c => diasRestantes(c.fechaControl) < diasRestantes(editando.fechaControl));
        const anterior = anteriores.length > 0
          ? anteriores.reduce((a,b) => diasRestantes(a.fechaControl) > diasRestantes(b.fechaControl) ? a : b)
          : null;
        nuevaFechaProgramada = anterior ? toInputDate(anterior.proxControl) : editando.fechaControl;
      }
      editando.fechaProgramada = nuevaFechaProgramada;

      controlGuardado = editando;
      controlEditandoId = null;
      await actualizarControl_(editando.id,{fechaControl:editando.fechaControl,proxControl:editando.proxControl,proxMeses:meses,bateriaAnios:editando.bateriaAnios,bateriaMeses:editando.bateriaMeses,indicaciones:editando.indicaciones,riesgoManual:editando.riesgoManual,parametrosTecnicos:editando.parametrosTecnicos,fechaProgramada:nuevaFechaProgramada});
    } else {
      // Nuevo control
      const controlesPrevios = controles.filter(c => c.pacienteId===pacienteId && c.dispositivoId===dispositivoId);
      let fechaProgramada = fechaControl;
      if (controlesPrevios.length > 0) {
        const ultimo = controlesPrevios.reduce((a,b) => diasRestantes(a.fechaControl) > diasRestantes(b.fechaControl) ? a : b);
        fechaProgramada = toInputDate(_parseFmt(ultimo.proxControl));
      }
      let nuevoControl = {
        id:'C'+(nextControlId),
        pacienteId, dispositivoId,
        profesionalId: profesionalLogueado ? profesionalLogueado.id : '',
        fechaProgramada: toInputDate(fechaProgramada),
        fechaControl: toInputDate(fechaControl),
        proxControl: toInputDate(proxControl),
        proxMeses: proxMesesTotal,
        bateriaAnios: document.getElementById('f-bateria-anios').value,
        bateriaMeses: document.getElementById('f-bateria-meses').value,
        eriProximo: 'No',
        parametrosTecnicos: {...parametrosTecnicosTemp},
        fase: null,
        indicaciones: document.getElementById('f-indicaciones').value,
        riesgoManual: document.getElementById('f-riesgo-manual').checked,
        fechaCarga: new Date().toISOString()
      };
      const _rCtrl = await guardarNuevoControl_(nuevoControl);
      nuevoControl.id = _rCtrl.id;
      // controles.push ya lo hace guardarNuevoControl_ internamente
      controlGuardado = controles.find(c => c.id === _rCtrl.id) || nuevoControl;
    }

    // Actualizar subtipo y fecha implante del dispositivo
    const dispActualizar = dispositivos.find(d => d.id === dispositivoId);
    if (dispActualizar && !modoEdicion) {
      const nuevoSubtipo = document.getElementById('f-subtipo')?.value;
      if (nuevoSubtipo !== undefined) dispActualizar.subtipo = nuevoSubtipo;
      const nuevaFecha = document.getElementById('f-fecha-implante')?.value;
      if (nuevaFecha !== undefined) dispActualizar.fechaImplante = nuevaFecha;
      const nuevoMotivo = getMotivoValue('f-motivo-implante');
      if (nuevoMotivo !== undefined) dispActualizar.motivoImplante = nuevoMotivo;
      const _cd={}; if(nuevoSubtipo!==undefined)_cd.subtipo=nuevoSubtipo; if(nuevaFecha!==undefined)_cd.fechaImplante=nuevaFecha; if(nuevoMotivo!==undefined)_cd.motivoImplante=nuevoMotivo;
      if(Object.keys(_cd).length) actualizarDispositivo_(dispositivoId,_cd).catch(e=>console.error('actualizarDisp:',e));
    }

    renderDash();

    let retraso = 0, riesgo = {alto:false, motivos:[]};
    try {
      retraso = calcularRetrasoMeses(controlGuardado);
      riesgo  = calcularRiesgo(controlGuardado);
    } catch(e) { console.error('calcular retraso/riesgo:', e); }

    // Mostrar modal de confirmación
    const overlay = document.getElementById('modal-overlay');
    const content = document.getElementById('modal-content');
    overlay.classList.remove('show'); // resetear primero
    void overlay.offsetHeight;        // forzar reflow
    overlay.classList.add('show');
    content.style.maxWidth = '420px';
    content.innerHTML = `
      <div style="text-align:center; margin-bottom:1.25rem;">
        <div style="width:48px; height:48px; border-radius:50%; background:var(--mr-teal-bg); display:flex; align-items:center; justify-content:center; margin:0 auto 12px;">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--mr-teal-text)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h3 style="margin-bottom:4px;">${modoEdicion ? 'Control actualizado' : 'Control guardado'}</h3>
        <div style="font-size:13px; color:var(--mr-text-muted);">${pacienteLogueado ? '' : (pacientes.find(p=>p.id===pacienteId)?.nombre || '')}</div>
        <div style="font-size:13px; color:var(--mr-text-muted); margin-top:4px;">Próximo control: <strong>${fmtMesAnio(proxControl)}</strong></div>
        ${retraso > 0 ? `<div style="font-size:12px; color:var(--mr-amber-text); margin-top:4px;">Retraso respecto a lo programado: ${retraso} mes(es)</div>` : ''}
        <div style="margin-top:6px;"><span class="${riesgo.alto ? 'risk-alto' : 'risk-bajo'}" style="font-size:12px; padding:3px 10px; border-radius:12px;">${riesgo.alto ? 'Alto riesgo' : 'Bajo riesgo'}</span></div>
      </div>
      <div style="display:flex; gap:8px;">
        <button id="modal-ctrl-hc" class="btn-secondary" style="flex:1; display:flex; align-items:center; justify-content:center; gap:6px;">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          Ver resumen HC
        </button>
        <button id="modal-ctrl-pac" class="btn-primary" style="flex:1;">Ir a Pacientes</button>
      </div>
    `;
    document.getElementById('modal-ctrl-hc').addEventListener('click', () => {
      content.style.maxWidth = '';
      closeModal();
      _submitRunning = false;
    openModalResumenControl(controlGuardado.id, () => showView('pac'));
    });
    document.getElementById('modal-ctrl-pac').addEventListener('click', () => {
      content.style.maxWidth = '';
      closeModal();
      _submitRunning = false;
      showView('pac');
    });
    // El formulario se resetea automáticamente en showView cuando se navega a otra vista
  });
}

    </div>
  `;

  document.getElementById('mps-guardar').addEventListener('click', async () => {

    const nombre = formatearNombre(document.getElementById('mps-nombre').value.trim());
