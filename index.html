    if (dniExistente) {
      msg.style.display = 'block';
      msg.innerHTML = `Ya existe un paciente con ese DNI: <strong>${dniExistente.nombre}</strong>.`;
      return;
    }
    const datosMPS = {nombre:`${apellido}, ${nombre}`, dni, tel:document.getElementById('mps-tel').value.trim(), sexo:document.getElementById('mps-sexo').value, fechaNacimiento:document.getElementById('mps-fechanac').value, estado:'Activo', consentimiento:document.getElementById('mps-consentimiento').checked};
    const _rMPS = await guardarNuevoPaciente_(datosMPS);
    const nuevo = {...datosMPS, id:_rMPS.id, codigo:_rMPS.codigo};
    closeModal();
    if (onSaved) onSaved(nuevo);
  });
}

function subtipoDispHTML(prefijo) {
  return `

function bindSubtipoDisp(tipoId, configFieldId, configId) {
  const opciones = {
    T1: ['Unicameral (A)', 'Unicameral (V)', 'Bicameral'],
    T2: ['Unicameral', 'Bicameral', 'Subcutáneo']
  };
  function update() {
    const tipo = document.getElementById(tipoId).value;
    const field = document.getElementById(configFieldId);
    const sel = document.getElementById(configId);
    const opts = opciones[tipo];
    if (opts) {
      sel.innerHTML = `<option value="">— Seleccionar —</option>` + opts.map(o=>`<option value="${o}">${o}</option>`).join('');
      field.style.display = 'block';
    } else {
      sel.innerHTML = '';
      field.style.display = 'none';
    }
  }
  document.getElementById(tipoId).addEventListener('change', update);
  update();
}

function getDispositivoActivo(pacienteId) {
  // Si hay varios activos, tomar el con fecha de implante más reciente
  const activos = dispositivos.filter(d=>d.pacienteId===pacienteId && d.activo);
  if (activos.length === 0) return null;
  if (activos.length === 1) return activos[0];
  return activos.reduce((a,b) => (a.fechaImplante||'') >= (b.fechaImplante||'') ? a : b);
}

function renderListaPacientes(filtro='', tiposActivos=[], marcasActivas=[]) {
  const lista = document.getElementById('lista-pac');
  let html = '';
  const normalizar = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/,/g,' ').replace(/\s+/g,' ').trim();
  const pacientesFiltrados = pacientes.filter(p => {
    const dispPac = dispositivos.find(d => d.pacienteId === p.id && d.activo);
    if (tiposActivos.length > 0 && (!dispPac || !tiposActivos.includes(dispPac.tipo))) return false;
    if (marcasActivas.length > 0 && (!dispPac || !marcasActivas.includes(dispPac.marca))) return false;
    if (!filtro) return true;
    const nombre = normalizar(p.nombre);
    const busqueda = normalizar(filtro);
    const textoDisp = dispPac ? [dispPac.marca, dispPac.modelo, dispPac.serie].filter(Boolean).join(' ').toLowerCase() : '';
    return busqueda.split(' ').every(palabra => nombre.includes(palabra) || textoDisp.includes(palabra)) || p.dni.includes(filtro) || (p.codigo||'').toLowerCase().includes(filtro);
  }).sort((a, b) => {
    const activo = e => e.estado === 'Activo' || !e.estado;
    if (activo(a) && !activo(b)) return -1;
    if (!activo(a) && activo(b)) return 1;
    return a.nombre.localeCompare(b.nombre);

  pacientesFiltrados.forEach(p => {
    const dispActivo = getDispositivoActivo(p.id);

            <div class="muted" style="font-size:12px;">DNI ${p.dni}${p.sexo ? ' · '+(p.sexo==='F'?'Femenino':p.sexo==='M'?'Masculino':'Otro') : ''}${p.fechaNacimiento ? ' · '+calcularEdad(p.fechaNacimiento)+' años' : ''}</div>

              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
            </button>
            <button class="btn-icon-tooltip btn-editar-pac" data-pac="${p.id}" data-tooltip="Editar paciente">

              <div style="display:flex; gap:4px;">
                <button class="btn-icon-tooltip btn-editar-disp" data-pac="${p.id}" data-tooltip="Editar dispositivo">
                  <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </button>
                <button class="btn-icon-tooltip btn-recambio" data-pac="${p.id}" data-tooltip="Registrar recambio">
                  <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                </button>
              </div>
            </div>` : `
            <div style="font-size:13px; color:var(--mr-text-muted); margin-bottom:8px;">No hay dispositivo activo.</div>
            <button class="btn-primary btn-add-disp" data-pac="${p.id}" style="font-size:12px; padding:6px 12px; margin-bottom:8px;">+ Agregar dispositivo</button>`}
          ${historial.length > 0 ? `
            <div style="font-weight:700; font-size:12px; color:var(--mr-text-muted); margin-bottom:4px; margin-top:4px;">Historial de recambios</div>
            ${historial.map(d=>`<div style="border:0.5px solid var(--mr-border); border-radius:8px; padding:0.5rem 0.8rem; background:#fff; font-size:12px; color:var(--mr-text-muted); margin-bottom:4px;">${(TIPOS[d.tipo] || {nombre:d.tipo||'?', lapso:12}).nombre} · ${d.marca} ${d.modelo}${d.fechaRecambio ? ' · Reemplazado: '+fmtDate(d.fechaRecambio) : ''}</div>`).join('')}` : ''}
        </div>
        ${(() => {
          const ultControl = controles.filter(c=>c.pacienteId===p.id).sort((a,b)=>diasRestantes(a.fechaControl)-diasRestantes(b.fechaControl))[0];
          if (!ultControl) return '';
          return `
          <div id="pac-linea-control-${p.id}" style="display:flex; padding:4px 1rem 8px; border-top:0.5px solid var(--mr-border); align-items:center; justify-content:space-between; cursor:pointer;" onclick="toggleControlesPaciente('${p.id}')">
            <div style="font-size:12px; color:var(--mr-text-muted);">
              <span style="font-weight:500; color:var(--mr-text-muted);">Último control:</span> ${fmtDate(ultControl.fechaControl)} · Próx: ${fmtDate(ultControl.proxControl)}
            </div>
            <span style="font-size:12px; color:var(--mr-text-muted);">▾</span>
          </div>
          <div id="pac-controles-${p.id}" style="display:none; border-top:0.5px solid var(--mr-border); padding:0.75rem 1rem; background:var(--mr-bg);"></div>`;
        })()}
      </div>
    `;
  });
  if (pacientesFiltrados.length === 0) html = `<div class="empty">${filtro ? 'No se encontraron pacientes con ese criterio de búsqueda.' : 'No hay pacientes registrados'}</div>`;
  lista.innerHTML = html;

  document.querySelectorAll('.btn-recambio').forEach(btn => {
    btn.addEventListener('click', () => openModalRecambio(btn.dataset.pac));
  });
  document.querySelectorAll('.btn-add-disp').forEach(btn => {
    btn.addEventListener('click', () => openModalNuevoDispositivo(btn.dataset.pac, () => renderListaPacientes(filtro)));
  });
  document.querySelectorAll('.btn-editar-pac').forEach(btn => {
    btn.addEventListener('click', () => openModalEditarPaciente(btn.dataset.pac));
  });
  document.querySelectorAll('.btn-ver-pac').forEach(btn => {
    btn.addEventListener('click', () => openModalVistaPaciente(btn.dataset.pac));
  });
  document.querySelectorAll('.btn-nuevo-control-pac').forEach(btn => {
    btn.addEventListener('click', () => {
      showView('form');
      setTimeout(() => {
        setPacienteSelector('f-paciente', btn.dataset.pac);
        document.getElementById('f-paciente').dispatchEvent(new Event('change'));
      }, 50);
    });
  });
  document.querySelectorAll('.btn-editar-disp').forEach(btn => {

}

async function openModalVistaPaciente(pacienteId) {
  const pac = pacientes.find(p=>p.id===pacienteId);
  if (!pac) return;

  const overlay = document.getElementById('modal-overlay');
  const content = document.getElementById('modal-content');
  overlay.classList.add('show');
  content.style.maxWidth = '400px';

  // --- Calcular datos ---
  const controlesPac = controles.filter(c=>c.pacienteId===pac.id);
  if (controlesPac.length === 0) {
    content.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
        <div style="font-size:12px;color:var(--mr-text-muted);">Vista del paciente · <strong>${pac.nombre}</strong></div>
        <button id="cvp-cerrar" class="btn-secondary" style="font-size:12px;padding:4px 10px;">Cerrar</button>
      </div>
      <div style="font-size:13px;color:var(--mr-text-muted);text-align:center;padding:1.5rem;">Este paciente aún no tiene controles registrados.</div>`;
    document.getElementById('cvp-cerrar').addEventListener('click',()=>{content.style.maxWidth='';closeModal();});
    return;
  }

  const controlActivo = controlesPac.reduce((a,b)=>diasRestantes(a.fechaControl)>diasRestantes(b.fechaControl)?a:b);
  const dispActivo = dispositivos.find(d=>d.id===controlActivo.dispositivoId);
  if (!dispActivo) {
    content.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
        <div style="font-size:12px;color:var(--mr-text-muted);">Vista del paciente · <strong>${pac.nombre}</strong></div>
        <button id="cvp-cerrar" class="btn-secondary" style="font-size:12px;padding:4px 10px;">Cerrar</button>
      </div>
      <div style="font-size:13px;color:var(--mr-text-muted);text-align:center;padding:1.5rem;">Sin dispositivo activo asociado al último control.</div>`;
    document.getElementById('cvp-cerrar').addEventListener('click',()=>{content.style.maxWidth='';closeModal();});
    return;
  }

  const tipo = TIPOS[dispActivo.tipo] || {nombre: dispActivo.tipo || 'Dispositivo', lapso: 12};
  const dias = diasRestantes(controlActivo.proxControl);
  const vencido = dias < 0;
  const proximo = dias >= 0 && dias <= VENTANA_DIAS;

  let alertaBg, alertaText, titulo, subtitulo;
  let mostrarTurnos = false;
  if (vencido) {
    alertaBg='var(--mr-coral-bg)'; alertaText='var(--mr-coral-text)';
    titulo='Tenés un control pendiente';
    subtitulo='Te esperamos en el servicio. Reservá tu turno cuando puedas.';
    mostrarTurnos = true;
  } else if (proximo) {
    alertaBg='var(--mr-amber-bg)'; alertaText='var(--mr-amber-text)';
    titulo='Se acerca tu próximo control';
    subtitulo=`Te toca venir a control en ${fmtMesAnio(controlActivo.proxControl)}. Reservá tu turno.`;
    mostrarTurnos = true;
  } else {
    alertaBg='var(--mr-teal-bg)'; alertaText='var(--mr-teal-text)';
    titulo='Todo en orden';
    subtitulo=`Tu próximo control será en ${fmtMesAnio(controlActivo.proxControl)}.`;
  }

  // --- Turno existente ---
  const turnoExistente = turnosReservados.find(t=>t.pacienteId===pac.id);

  // --- Batería ---
  const mesesRestantes = vidaBateriaEstimadaHoy(controlActivo);
  let bateriaHTML = '';
  if (mesesRestantes !== null) {
    let batColor, batLabel, batPct;
    if (mesesRestantes <= 0)      { batColor='var(--mr-coral)';  batLabel='Batería crítica (ERI)';          batPct=5;  }
    else if (mesesRestantes <= 3)  { batColor='#E8650A';          batLabel='Batería con vida reducida';       batPct=20; }
    else if (mesesRestantes <= 12) { batColor='var(--mr-amber)';  batLabel='Batería con atención próxima';    batPct=45; }
    else                           { batColor='var(--mr-teal)';   batLabel='Batería en buen estado';          batPct=85; }
    bateriaHTML = `<div style="margin-top:12px;">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;">
        <span style="font-weight:500;color:${batColor};">${batLabel}</span>
        <span style="color:var(--mr-text-muted);">Estimado al día de hoy</span>
      </div>
      <div style="background:var(--mr-border);border-radius:4px;height:8px;overflow:hidden;">
        <div style="width:${batPct}%;background:${batColor};height:100%;border-radius:4px;"></div>
      </div></div>`;
  }

  // --- Historial ---
  const historial = [...controlesPac].sort((a,b)=>diasRestantes(a.fechaControl)-diasRestantes(b.fechaControl)).slice(0,3);

  // --- Sección de turno (idéntica a la vista del paciente) ---
  let turnoReservado = turnoExistente || null; // puede cambiar si el profesional reserva
  function buildTurnoHTML() {
    if (!mostrarTurnos) return '';
    if (turnoReservado) {
      return `<div style="background:var(--mr-teal-bg);color:var(--mr-teal-text);border-radius:10px;padding:1rem;margin-bottom:1rem;">
        <div style="font-weight:700;font-size:14px;margin-bottom:6px;">✓ Turno reservado</div>
        <div style="font-size:13px;text-transform:capitalize;">${fmtDateLong(turnoReservado.fecha)} a las ${turnoReservado.hora} hs</div>
        <div style="font-size:12px;color:var(--mr-teal-text);margin-top:4px;">${CONFIG_INSTITUCION.servicio}</div>
        <div style="font-size:12px;color:var(--mr-teal-text);">${CONFIG_INSTITUCION.institucion}</div>
        <button id="cvp-btn-cambiar-turno" class="btn-secondary" style="margin-top:10px;font-size:12px;padding:6px 12px;">Modificar turno</button>
      </div>`;
    }
    // Selector de turnos
    const hoy = new Date(); hoy.setHours(0,0,0,0);
    const finH = new Date(hoy.getTime() + HORIZONTE_TURNOS_DIAS*86400000);
    const horariosOnline = AGENDA_CONFIG.horarios.slice(0, TURNOS_ONLINE_POR_DIA);
    const opciones = [];
    for (let d = new Date(hoy); d <= finH; d.setDate(d.getDate()+1)) {
      const fechaStr = toInputDate(d);
      if (AGENDA_CONFIG.diasAtencion.includes(d.getDay()) && !AGENDA_CONFIG.diasBloqueados.includes(fechaStr)) {
        const libres = horariosOnline.filter(h => !turnosReservados.some(t => t.fecha===fechaStr && t.hora===h));
        if (libres.length > 0) opciones.push({fechaStr, libres, fechaLabel: fmtDateLong(fechaStr)});
      }
    }
    if (opciones.length === 0) {
      return `<div style="border:0.5px solid var(--mr-border);border-radius:10px;padding:1rem;margin-bottom:1rem;font-size:13px;color:var(--mr-text-muted);">No hay turnos disponibles en los próximos ${HORIZONTE_TURNOS_DIAS} días.</div>`;
    }
    let s = `<div style="border:0.5px solid var(--mr-border);border-radius:10px;padding:1rem;margin-bottom:1rem;">
      <div style="font-weight:700;font-size:14px;color:var(--mr-primary);margin-bottom:10px;">Reservá tu turno</div>`;
    opciones.forEach((op, i) => {
      s += `<div style="margin-bottom:${i<opciones.length-1?'10px':'0'};">
        <div style="font-size:12px;color:var(--mr-text-muted);margin-bottom:4px;text-transform:capitalize;">${op.fechaLabel}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">`;
      op.libres.forEach(h => {
        s += `<button class="cvp-btn-horario btn-secondary" data-fecha="${op.fechaStr}" data-hora="${h}" style="font-size:12px;padding:4px 10px;">${h}</button>`;
      });
      s += `</div></div>`;
    });
    s += `</div>`;
    return s;
  }
  let turnoHTML = buildTurnoHTML();

  // --- Render final ---
  content.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
      <div style="font-size:12px;color:var(--mr-text-muted);">Vista del paciente · <strong>${pac.nombre}</strong></div>
      <button id="cvp-cerrar" class="btn-secondary" style="font-size:12px;padding:4px 10px;">Cerrar</button>
    </div>
    <div style="margin-bottom:1rem;">
      <div style="font-size:13px;color:var(--mr-text-muted);margin-bottom:2px;">Hola,</div>
      <div style="font-size:18px;font-weight:700;">${pac.nombre.split(', ')[1]||''} ${pac.nombre.split(', ')[0]||pac.nombre}</div>
    </div>
    <div style="background:${alertaBg};color:${alertaText};border-radius:10px;padding:1rem;margin-bottom:1rem;">
      <div style="font-weight:700;font-size:15px;margin-bottom:2px;">${titulo}</div>
      <div style="font-size:13px;">${subtitulo}</div>
    </div>
    <div id="cvp-turno-section">${turnoHTML}</div>
    <div style="border:0.5px solid var(--mr-border);border-radius:10px;padding:1rem;margin-bottom:1rem;">
      <div style="font-size:13px;color:var(--mr-text-muted);margin-bottom:10px;">Mi dispositivo</div>
      <div style="font-size:14px;font-weight:700;">${tipo.nombre}</div>
      <div style="font-size:12px;color:var(--mr-text-muted);">${dispActivo.marca}${dispActivo.modelo?' · '+dispActivo.modelo:''}</div>
      ${bateriaHTML}
    </div>
    <div style="border:0.5px solid var(--mr-border);border-radius:10px;padding:1rem;">
      <div style="font-size:13px;color:var(--mr-text-muted);margin-bottom:8px;">Historial de controles</div>
      ${historial.map(c=>`
        <div style="display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:0.5px solid var(--mr-border);">
          <span>Control de dispositivo</span>
          <span style="color:var(--mr-text-muted);">${fmtDate(c.fechaControl)}</span>
        </div>`).join('')}
    </div>
  `;

  document.getElementById('cvp-cerrar').addEventListener('click',()=>{content.style.maxWidth='';closeModal();});

  function bindCvpListeners() {
    // Botón modificar turno
    const btnCambiar = document.getElementById('cvp-btn-cambiar-turno');
    if (btnCambiar) {
      btnCambiar.addEventListener('click', () => {
        turnoReservado = null;
        turnoHTML = buildTurnoHTML();
        document.getElementById('cvp-turno-section').innerHTML = turnoHTML;
        bindCvpListeners();
      });
    }
    // Botones de horario
    content.querySelectorAll('.cvp-btn-horario').forEach(btn => {
      btn.addEventListener('click', async () => {
        const res = await reservarTurno_({pacienteId:pac.id, fecha:btn.dataset.fecha, hora:btn.dataset.hora, controlId:controlActivo.id, origen:'presencial'});
        if (!res.ok) { alert(res.error||'Ese horario ya no está disponible.'); return; }
        turnoReservado = turnosReservados.find(t=>t.pacienteId===pac.id) || {fecha:btn.dataset.fecha, hora:btn.dataset.hora};
        document.getElementById('cvp-turno-section').innerHTML = buildTurnoHTML();
        bindCvpListeners();
      });
    });
  }
  bindCvpListeners();
}

function openModalParametrosTecnicos(disp) {
  const perfil = getPerfilDispositivo(disp);
  if (!perfil) return;
  const paramsDelPerfil = new Set(getParamsParaPerfil(perfil));
  const overlay = document.getElementById('modal-overlay');
  const content = document.getElementById('modal-content');
  overlay.classList.add('show');
  content.style.maxWidth = '580px';

  function renderGrupo(g) {
    // Especial: checkbox + campos inline (salida/sensibilidad)
    if (g.especial) {
      const PARAMS_SALIDA = ['Salida A (autocaptura/manual: valor)', 'Salida VD (autocaptura/manual: valor)', 'Salida VI'];
      const PARAMS_SENS = ['Sensibilidad (automática/manual: valor)'];

      const tieneAlguno = g.perfilParams.some(p => paramsDelPerfil.has(p)) ||
        (g.especial === 'salida' && paramsDelPerfil.has('Salida VI')) ||
        (g.especial === 'sensibilidad' && paramsDelPerfil.has('Sensibilidad (automática/manual: valor)'));
      if (!tieneAlguno) return '';

      // Determinar qué subparams aplican
      // Determinar canales disponibles según el perfil
      const tieneA  = getParamsParaPerfil(perfil).some(p => p.includes('Salida A') || p.includes('Umbral A') || p.includes('Sensibilidad') && p.includes('A'));
      const tieneVD = getParamsParaPerfil(perfil).some(p => p.includes('Salida VD') || p.includes('Umbral VD'));
      const tieneVI = getParamsParaPerfil(perfil).some(p => p.includes('Salida VI') || p.includes('VI'));
      const subVisible = g.subparams.filter(s => {
        if (g.especial === 'salida') {
          if (s.label.startsWith('A'))  return paramsDelPerfil.has('Salida A (autocaptura/manual: valor)') || tieneA;
          if (s.label.startsWith('VD')) return paramsDelPerfil.has('Salida VD (autocaptura/manual: valor)') || tieneVD;
          if (s.label.startsWith('VI')) return paramsDelPerfil.has('Salida VI') || tieneVI;
        }
        if (g.especial === 'sensibilidad') {
          if (s.label.startsWith('A'))  return paramsDelPerfil.has('Sensibilidad (automática/manual: valor)') && tieneA;
          if (s.label.startsWith('VD')) return paramsDelPerfil.has('Sensibilidad (automática/manual: valor)') && tieneVD;
          if (s.label.startsWith('VI')) return paramsDelPerfil.has('Sensibilidad (automática/manual: valor)') && tieneVI;
        }
        return false;
      });

      const checkId = `chk-${g.checkParam.replace(/ /g,'-')}`;
      const isChecked = parametrosTecnicosTemp[g.checkParam] === 'true';
      return `
        <div style="margin-bottom:10px;">
          <div style="display:flex; align-items:center; gap:8px; margin-bottom:4px;">
            <label style="font-size:11px; color:var(--mr-text-muted); margin:0;">${g.label}</label>
            <div style="display:flex; align-items:center; gap:4px;">
              <input type="checkbox" id="${checkId}" class="especial-chk" data-param="${g.checkParam}" ${isChecked?'checked':''} style="width:auto; margin:0;">
              <label for="${checkId}" style="font-size:11px; margin:0; color:var(--mr-text-muted);">${g.checkLabel}</label>
            </div>
          </div>
          <div style="display:flex; gap:8px; flex-wrap:wrap;">
            ${subVisible.map(s => `
              <div style="flex:1; min-width:70px;">
                <div style="font-size:10px; color:var(--mr-text-muted); margin-bottom:2px;">${s.label}</div>
                <input type="text" class="param-input" data-param="${s.param}" value="${parametrosTecnicosTemp[s.param]||''}" ${isChecked?'disabled':''} style="padding:5px 8px; font-size:12px; width:100%; ${isChecked?'background:#f0f0f0; color:#aaa;':''}">
              </div>`).join('')}
          </div>
        </div>`;
    }
    if (g.bateria) {
      // Batería: tiempo (años + meses linkeados al form) + %
      const pct = paramsDelPerfil.has('Batería (%)');
      const tiempo = paramsDelPerfil.has('Batería (tiempo)');
      if (!tiempo && !pct) return '';
      const aniosVal = document.getElementById('f-bateria-anios')?.value || '';
      const mesesVal = document.getElementById('f-bateria-meses')?.value || '';
      return `
        <div style="margin-bottom:10px;">
          <label style="font-size:11px; color:var(--mr-text-muted); display:block; margin-bottom:4px;">Batería</label>
          <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:flex-end;">
            ${tiempo ? `
              <div style="flex:1; min-width:70px;">
                <div style="font-size:10px; color:var(--mr-text-muted); margin-bottom:2px;">Años</div>
                <input type="number" id="params-bat-anios" min="0" step="1" placeholder="0" value="${aniosVal}" style="padding:5px 8px; font-size:12px; width:100%;">

              <div style="flex:1; min-width:70px;">
                <div style="font-size:10px; color:var(--mr-text-muted); margin-bottom:2px;">%</div>
                <input type="text" class="param-input" data-param="Batería (%)" value="${parametrosTecnicosTemp['Batería (%)']||''}" style="padding:5px 8px; font-size:12px; width:100%;">
              </div>` : ''}
          </div>
        </div>`;
    }
    if (g.inline) {
      const visibles = g.subparams.filter(s => paramsDelPerfil.has(s.param));
      if (visibles.length === 0) return '';
      return `
        <div style="margin-bottom:10px;">
          <label style="font-size:11px; color:var(--mr-text-muted); display:block; margin-bottom:4px;">${g.label}</label>
          <div style="display:flex; gap:8px; flex-wrap:wrap;">
            ${visibles.map(s => `
              <div style="flex:1; min-width:80px;">
                <div style="font-size:10px; color:var(--mr-text-muted); margin-bottom:2px;">${s.label}</div>
                <input type="text" class="param-input" data-param="${s.param}" value="${parametrosTecnicosTemp[s.param]||''}" style="padding:5px 8px; font-size:12px; width:100%;">
              </div>`).join('')}
          </div>
        </div>`;
    } else {
      const param = g.params?.[0];
      if (!paramsDelPerfil.has(param)) return '';
      const input = g.fullwidth
        ? `<textarea class="param-input" data-param="${param}" style="padding:5px 8px; font-size:12px; width:100%; min-height:48px; resize:vertical;">${parametrosTecnicosTemp[param]||''}</textarea>`
        : `<input type="text" class="param-input" data-param="${param}" value="${parametrosTecnicosTemp[param]||''}" style="padding:5px 8px; font-size:12px; width:100%;">`;
      return `
        <div style="margin-bottom:10px;">
          <label style="font-size:11px; color:var(--mr-text-muted); display:block; margin-bottom:4px;">${g.label}</label>
          ${input}
        </div>`;
    }
  }

  function renderSeccion(titulo, color, seccion) {
    const grupos = PARAM_GRUPOS.filter(g => (g.seccion||'general') === seccion);
    const html = grupos.map(renderGrupo).join('');
    if (!html.trim()) return '';
    return `
      <div style="font-weight:700; font-size:12px; color:${color}; margin:14px 0 8px; padding-top:10px; border-top:0.5px solid var(--mr-border);">${titulo}</div>
      ${html}`;
  }

  content.innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.75rem;">
      <h3 style="margin:0;">Parámetros técnicos</h3>
      <span style="font-size:12px; color:var(--mr-text-muted);">${(TIPOS[disp.tipo]||{nombre:disp.tipo||'?'}).nombre}${disp.subtipo?' · '+disp.subtipo:''}</span>
    </div>
    <div style="max-height:70vh; overflow-y:auto; padding-right:4px;">
      ${renderSeccion('Parámetros generales', 'var(--mr-primary)', 'general')}
      ${renderSeccion('Parámetros CDI', 'var(--mr-coral)', 'CDI')}
      <div style="font-weight:700; font-size:12px; color:var(--mr-text-muted); margin:14px 0 6px; padding-top:10px; border-top:0.5px solid var(--mr-border);">Otros datos</div>
      <textarea id="params-otros" style="width:100%; font-size:12px; padding:6px 8px; border:1px solid var(--mr-border); border-radius:6px; resize:vertical; min-height:60px;">${parametrosTecnicosTemp['__otros__']||''}</textarea>
    </div>
    <div style="display:flex; gap:8px; margin-top:1rem;">
      <button id="params-guardar" class="btn-primary">Guardar parámetros</button>
      <button id="params-cancelar" class="btn-secondary">Cancelar</button>
    </div>
  `;

  content.querySelectorAll('.especial-chk').forEach(chk => {
    chk.addEventListener('change', () => {
      const row = chk.closest('div');
      row.querySelectorAll('.param-input').forEach(inp => {
        inp.disabled = chk.checked;
        inp.style.background = chk.checked ? '#f0f0f0' : '';
        inp.style.color = chk.checked ? '#aaa' : '';
      });
    });
  });

  document.getElementById('params-cancelar').addEventListener('click', () => {
    content.style.maxWidth = '';
    closeModal();
  });
  document.getElementById('params-guardar').addEventListener('click', () => {
    document.querySelectorAll('.param-input').forEach(inp => {
      if (!inp.disabled) parametrosTecnicosTemp[inp.dataset.param] = inp.value.trim();
    });
    document.querySelectorAll('.especial-chk').forEach(chk => {
      parametrosTecnicosTemp[chk.dataset.param] = chk.checked ? 'true' : 'false';
    });
    // Sincronizar batería con campos del formulario
    const batAnios = document.getElementById('params-bat-anios');
    const batMeses = document.getElementById('params-bat-meses');
    if (batAnios) {
      const fAnios = document.getElementById('f-bateria-anios');
      const fMeses = document.getElementById('f-bateria-meses');
      if (fAnios) fAnios.value = batAnios.value;
      if (fMeses) fMeses.value = batMeses?.value || '';
      parametrosTecnicosTemp['Batería (tiempo)'] = `${batAnios.value||'0'}a ${batMeses?.value||'0'}m`;
    }
    parametrosTecnicosTemp['__otros__'] = document.getElementById('params-otros')?.value.trim() || '';
    const completados = Object.entries(parametrosTecnicosTemp).filter(([k,v])=>v && k!=='__otros__').length;
    const resumen = document.getElementById('f-params-resumen');
    if (completados > 0 || parametrosTecnicosTemp['__otros__']) {
      resumen.style.display = 'block';
      resumen.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px; margin-right:4px;"><polyline points="20 6 9 17 4 12"/></svg> ${completados} parámetro(s) técnico(s) cargado(s)`;
    }
    content.style.maxWidth = '';
    closeModal();
  });
}

// Mapa de unidades por parámetro técnico (clave interna -> unidad)
const UNIDADES_PARAM = {
  'Frecuencia básica': 'ppm',
  'Histéresis de Fcia.': 'ppm',
  'Int. AV': 'ms',
  'Intervalo V-V': 'ms',
  'Sensibilidad A': 'mV', 'Sensibilidad VD': 'mV', 'Sensibilidad VI': 'mV',
  'Salida A': 'V', 'Salida VD': 'V', 'Salida VI': 'V',
  'Umbral A': 'V', 'Umbral VD': 'V', 'Umbral VI': 'V',
  'Impedancia A': 'Ω', 'Impedancia VD': 'Ω', 'Impedancia VI': 'Ω',
  'Amplitud de detección A (onda P)': 'mV', 'Amplitud de detección V (onda R)': 'mV',
  'AP': '%', 'VP': '%', 'VP-bi': '%',
  'Impedancia choque': 'Ω',
  'Zona TV1-F': 'ppm', 'Zona TV2-F': 'ppm', 'Zona FV-F': 'ppm',
  'Tiempo de carga': 's',
};

function generarTextoResumen(controlId) {
  const control = controles.find(c => c.id === controlId);
  if (!control) return '';
  const pac = pacientes.find(p => p.id === control.pacienteId);
  const disp = dispositivos.find(d => d.id === control.dispositivoId);
  const prof = profesionales.find(p => p.id === control.profesionalId);

  const edad = pac?.fechaNacimiento ? calcularEdad(pac.fechaNacimiento) : null;
  const sexoTexto = pac?.sexo === 'F' ? 'femenina' : pac?.sexo === 'M' ? 'masculino' : null;
  const tipo = disp ? (TIPOS[disp.tipo]?.nombre || disp.tipo || '') : '';
  const subtipo = disp?.subtipo || '';
  const vidaBat = fmtVidaBateria(control);

  // Parámetros técnicos completados
  const params = control.parametrosTecnicos || {};
  const paramsTexto = Object.entries(params)
    .filter(([k,v]) => v && k !== '__otros__' && k !== 'Salida autocaptura' && k !== 'Sensibilidad automática' && k !== 'Batería (tiempo)')
    .map(([k,v]) => {
      // Manejar checkboxes especiales
      if (k === 'Salida autocaptura' && v === 'true') return 'Salida: Autocaptura';
      if (k === 'Sensibilidad automática' && v === 'true') return 'Sensibilidad: Automática';
      return `${k}: ${v}${UNIDADES_PARAM[k] ? ' ' + UNIDADES_PARAM[k] : ''}`;
    }).join('\n');

  // Autocaptura / automática
  const autocaptura = params['Salida autocaptura'] === 'true';
  const automatica = params['Sensibilidad automática'] === 'true';
  const checkTexto = [
    autocaptura ? 'Salida: Autocaptura' : null,
    automatica ? 'Sensibilidad: Automática' : null
  ].filter(Boolean).join('\n');

  const todosParams = [checkTexto, paramsTexto].filter(Boolean).join('\n');

  let texto = '';
  texto += `CONTROL DE DISPOSITIVO DE ESTIMULACIÓN CARDÍACA DE ${pac ? pac.nombre.split(', ').reverse().join(' ').toUpperCase() : '—'}\n\n`;
  texto += `Paciente${sexoTexto ? ' de sexo ' + sexoTexto : ''}${edad ? ' de ' + edad + ' años de edad' : ''}.`;
  texto += `\nTipo de dispositivo: ${tipo}${subtipo ? ' ' + subtipo : ''}`;
  texto += `\nMarca: ${(disp?.marca || '—').toUpperCase()}`;
  if (disp?.modelo) texto += `\nModelo: ${disp.modelo}`;
  if (disp?.serie) texto += `\nNúmero de serie: ${disp.serie}`;
  if (disp?.fechaImplante) texto += `\nFecha de implante: ${fmtDate(disp.fechaImplante)}`;
  if (disp?.motivoImplante) texto += `\nMotivo del implante: ${disp.motivoImplante}`;
  texto += `\n\nBatería: ${vidaBat}`;
  if (todosParams) texto += `\n${todosParams}`;
  if (params['__otros__']) texto += `\n${params['__otros__']}`;
  if (control.indicaciones) texto += `\n\nConsideraciones para el próximo control: ${control.indicaciones}`;
  texto += `\nPróximo control programado: ${fmtDate(control.proxControl)}`;

  return texto;
}

function openModalResumenControl(controlId, onClose = null) {
  const overlay = document.getElementById('modal-overlay');

    };

}

function openModalMotivo(idx, valorActual) {
  const overlay = document.getElementById('modal-overlay');
  const content = document.getElementById('modal-content');
  overlay.classList.add('show');
  content.style.maxWidth = '420px';
  const esNuevo = idx === null;
  content.innerHTML = `
    <h3>${esNuevo ? 'Nuevo motivo de implante' : 'Editar motivo'}</h3>
    <div class="field">
      <label>Descripción del motivo</label>
      <input type="text" id="modal-motivo-input" value="${valorActual || ''}" placeholder="Ej: Bloqueo AV completo (BAV III)">
    </div>
    <div id="modal-motivo-msg" class="msg err" style="display:none;"></div>
    <div style="display:flex; gap:8px;">
      <button id="modal-motivo-guardar" class="btn-primary">Guardar</button>
      <button id="modal-motivo-cancelar" class="btn-secondary">Cancelar</button>
    </div>
  `;
  document.getElementById('modal-motivo-input').focus();
  document.getElementById('modal-motivo-cancelar').addEventListener('click', () => {
    content.style.maxWidth = '';
    closeModal();
  });
  document.getElementById('modal-motivo-guardar').addEventListener('click', () => {
    const valor = document.getElementById('modal-motivo-input').value.trim();
    const msg = document.getElementById('modal-motivo-msg');
    if (!valor) { msg.style.display='block'; msg.textContent='Ingresá una descripción.'; return; }
    if (MOTIVOS_IMPLANTE.includes(valor) && valor !== valorActual) {
      msg.style.display='block'; msg.textContent='Ese motivo ya existe.'; return;
    }
    if (esNuevo) {
      MOTIVOS_IMPLANTE.splice(MOTIVOS_IMPLANTE.length - 1, 0, valor); // antes de "Otro"
    } else {
      dispositivos.forEach(d => { if (d.motivoImplante === valorActual) d.motivoImplante = valor; });
      MOTIVOS_IMPLANTE[idx] = valor;
    }
    guardarConfig_('MOTIVOS_IMPLANTE', MOTIVOS_IMPLANTE).catch(e=>console.error(e));
    content.style.maxWidth = '';
    closeModal();
    renderMotivos();
  });
}

          </button>`}
        </div>
      </div>`;
  });
  html += `</div>`;
  container.innerHTML = html;

  document.getElementById('cfg-marcas-nueva').addEventListener('click', () => {
    openModalMarca(null, null);
  });

  container.querySelectorAll('.cfg-marca-editar').forEach(btn => {
    btn.addEventListener('click', () => openModalMarca(parseInt(btn.dataset.idx), MARCAS_DISPOSITIVOS[parseInt(btn.dataset.idx)]));
  });

  container.querySelectorAll('.cfg-marca-eliminar').forEach(btn => {
    btn.addEventListener('click', () => {
      if (confirm(`¿Eliminás la marca "${btn.dataset.nombre}"?`)) {
        MARCAS_DISPOSITIVOS.splice(parseInt(btn.dataset.idx), 1);
        guardarConfig_('MARCAS_DISPOSITIVOS', MARCAS_DISPOSITIVOS).catch(e=>console.error(e));
        renderMarcas();
      }
    });
  });
}

function openModalMarca(idx, valorActual) {
  const overlay = document.getElementById('modal-overlay');
  const content = document.getElementById('modal-content');
  overlay.classList.add('show');
  content.style.maxWidth = '380px';
  const esNueva = idx === null;
  content.innerHTML = `
    <h3>${esNueva ? 'Nueva marca' : 'Editar marca'}</h3>
    <div class="field">
      <label>Nombre de la marca</label>
      <input type="text" id="modal-marca-input" value="${valorActual || ''}" placeholder="Ej: Abbott">
    </div>
    <div id="modal-marca-msg" class="msg err" style="display:none;"></div>
    <div style="display:flex; gap:8px;">
      <button id="modal-marca-guardar" class="btn-primary">Guardar</button>
      <button id="modal-marca-cancelar" class="btn-secondary">Cancelar</button>
    </div>
  `;
  document.getElementById('modal-marca-input').focus();
  document.getElementById('modal-marca-cancelar').addEventListener('click', () => {
    content.style.maxWidth = '';
    closeModal();
  });
  document.getElementById('modal-marca-guardar').addEventListener('click', () => {
    const nombre = document.getElementById('modal-marca-input').value.trim();
    const msg = document.getElementById('modal-marca-msg');
    if (!nombre) { msg.style.display='block'; msg.textContent='Ingresá un nombre.'; return; }
    if (MARCAS_DISPOSITIVOS.includes(nombre) && nombre !== valorActual) {
      msg.style.display='block'; msg.textContent='Esa marca ya existe.'; return;
    }
    if (esNueva) {
      MARCAS_DISPOSITIVOS.splice(MARCAS_DISPOSITIVOS.length - 1, 0, nombre); // antes de "Otro"
    } else {
      // Actualizar también en dispositivos existentes
      dispositivos.forEach(d => { if (d.marca === valorActual) d.marca = nombre; });
      MARCAS_DISPOSITIVOS[idx] = nombre;
    }
    guardarConfig_('MARCAS_DISPOSITIVOS', MARCAS_DISPOSITIVOS).catch(e=>console.error(e));
    content.style.maxWidth = '';
    closeModal();
    renderMarcas();
  });
}

    const filt = normalizar(filtro);
    const encontrados = pacientesSinControles.filter(p =>
      normalizar(p.nombre).includes(filt) || p.dni.includes(filtro)

    if (encontrados.length === 0) {

  const controlesPac = controles
    .filter(c => c.pacienteId === pacienteId)
    .sort((a,b) => diasRestantes(a.fechaControl) - diasRestantes(b.fechaControl));
  if (controlesPac.length === 0) { container.innerHTML = '<div class="empty">Sin controles.</div>'; return; }

function getDatosInvestigacion() {
  const realizados = controles.map(c => {
    const pac = pacientes.find(p=>p.id===c.pacienteId);
    const disp = dispositivos.find(d=>d.id===c.dispositivoId);
    const tipo = disp ? (TIPOS[disp.tipo] || {nombre:disp.tipo||'?',lapso:12}) : null;
    const riesgo = calcularRiesgo(c);
    // Determinar si es el primer control del dispositivo (sin referencia previa)
    const ctrlsAnteriores = controles.filter(x => x.id !== c.id && x.pacienteId===c.pacienteId && x.dispositivoId===c.dispositivoId && diasRestantes(x.fechaControl) < diasRestantes(c.fechaControl));
    const esPrimerControl = ctrlsAnteriores.length === 0;
    const retrasoDias    = esPrimerControl ? null : calcularRetrasoDias(c);
    const retrasoAjustado= esPrimerControl ? null : calcularRetrasoAjustado(c);
    const accion = accionesContacto.filter(ac => ac.controlId === c.id).slice(-1)[0];
    const incompleto = datosIncompletos(c);
    return {
      tipoRegistro: 'Realizado',
      codigo: pac.codigo,
      sexo: pac.sexo || '-',
      edad: calcularEdad(pac.fechaNacimiento) ?? '-',
      tipoDispositivo: tipo?.nombre || '-',
      fase: calcularFase(c),
      fechaProgramada: c.fechaProgramada,
      fechaRealizada: c.fechaControl,
      retrasoDias,
      retrasoAjustado,
      esPrimerControl,
      adherente: esPrimerControl ? 'N/A' : (esAdherente(c) ? 'Sí' : 'No'),
      vidaBateria: fmtVidaBateria(c),
      vidaBateriaMeses: vidaBateriaMeses(c),
      riesgo: riesgo.alto ? 'Alto' : 'Bajo',
      motivos: riesgo.motivos.join(' | '),
      seguimientoPerdido: esSeguimientoPerdido(c) ? 'Sí' : 'No',
      accion: accion ? `${accion.tipo} - ${accion.resultado}` : '-',
      aptoAnalisis: (incompleto.length===0 && pac.estado==='Activo' && pac.consentimiento===true) ? 'Sí' : 'No',
      motivoExclusion: incompleto.length ? `Faltan: ${incompleto.join(', ')}` : (pac.estado!=='Activo' ? `Paciente ${pac.estado}` : ''),
      fechaCarga: c.fechaCarga || ''
    };
  });

  const pendientes = getControlesPendientes().map(p => {
    const ultimo = p.ultimoControl;
    const riesgo = calcularRiesgo(ultimo);
    const accion = accionesContacto.filter(ac => ac.controlId === ultimo.id).slice(-1)[0];
    const incompleto = datosIncompletos(ultimo);
    return {
      tipoRegistro: 'Pendiente',
      codigo: p.paciente.codigo,
      sexo: p.paciente.sexo || '-',
      edad: calcularEdad(p.paciente.fechaNacimiento) ?? '-',
      tipoDispositivo: (TIPOS[p.dispositivo.tipo] || {nombre:p.dispositivo.tipo||'?', lapso:12}).nombre,
      fase: p.fase,
      fechaProgramada: p.fechaProgramada,
      fechaRealizada: null,
      retrasoDias: p.diasAtraso,
      retrasoAjustado: p.diasAtraso,
      adherente: 'No',
      vidaBateria: fmtVidaBateria(ultimo),
      vidaBateriaMeses: vidaBateriaMeses(ultimo),
      riesgo: riesgo.alto ? 'Alto' : 'Bajo',
      motivos: riesgo.motivos.join(' | '),
      seguimientoPerdido: p.seguimientoPerdido ? 'Sí' : 'No',
      accion: accion ? `${accion.tipo} - ${accion.resultado}` : '-',
      aptoAnalisis: (incompleto.length===0 && p.paciente.estado==='Activo' && p.paciente.consentimiento===true) ? 'Sí' : 'No',
      motivoExclusion: incompleto.length ? `Faltan: ${incompleto.join(', ')}` : (p.paciente.estado!=='Activo' ? `Paciente ${p.paciente.estado}` : ''),
      fechaCarga: ultimo.fechaCarga || ''
    };
  });

  return [...realizados, ...pendientes];
}

function descargarCSV(headers, rows, filename) {
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob(['\uFEFF' + csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function renderTurnoPaciente(controlActivo, pacienteActivo, estado) {
  const view = document.getElementById('turno-section');
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const finHorizonte = new Date(hoy.getTime() + HORIZONTE_TURNOS_DIAS*86400000);

  // Estado 1: no mostrar nada
  if (estado === 1) {
    view.innerHTML = `
      <div style="border:0.5px solid var(--mr-border); border-radius:10px; padding:1rem; display:flex; align-items:center; gap:10px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="color:var(--mr-text-muted); flex-shrink:0;"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <div style="font-size:13px; color:var(--mr-text-muted);">Cuando se acerque la fecha de tu próximo control vas a poder reservar tu turno acá.</div>
      </div>
    `;
    return;
  }

  // Estado 2 y 3: mostrar turno confirmado o selector
  if (turnoSeleccionadoPaciente) {
    view.innerHTML = `
      <div style="background:var(--mr-teal-bg); color:var(--mr-teal-text); border-radius:10px; padding:1rem;">
        <div style="font-weight:700; font-size:14px; margin-bottom:6px;">✓ Turno reservado</div>
        <div style="font-size:13px; text-transform:capitalize;">${fmtDateLong(turnoSeleccionadoPaciente.fecha)} a las ${turnoSeleccionadoPaciente.hora} hs</div>
        <div style="font-size:12px; color:var(--mr-teal-text); margin-top:4px;">${CONFIG_INSTITUCION.servicio}</div>
        <div style="font-size:12px; color:var(--mr-teal-text);">${CONFIG_INSTITUCION.institucion}</div>
        <button id="btn-cambiar-turno" class="btn-secondary" style="margin-top:10px; font-size:12px; padding:6px 12px;">Cambiar turno</button>
      </div>
    `;
    document.getElementById('btn-cambiar-turno').addEventListener('click', () => {
      turnoSeleccionadoPaciente = null;
      renderTurnoPaciente(controlActivo, pacienteActivo, estado).catch(e=>console.error('renderTurnoPaciente:',e));
    });
    return;
  }

  // Generar opciones desde hoy hasta 21 días
  const opciones = [];
  for (let d = new Date(hoy); d <= finHorizonte; d.setDate(d.getDate()+1)) {
    if (AGENDA_CONFIG.diasAtencion.includes(d.getDay()) && !AGENDA_CONFIG.diasBloqueados.includes(toInputDate(d))) {
      const fecha = new Date(d);
      // Solo los primeros TURNOS_ONLINE_POR_DIA horarios del día son para online
      const horariosOnline = AGENDA_CONFIG.horarios.slice(0, TURNOS_ONLINE_POR_DIA);
      const libres = horariosOnline.filter(h => !turnosReservados.some(t => toInputDate(t.fecha)===toInputDate(fecha) && t.hora===h));
      if (libres.length > 0) opciones.push({fecha, libres});
    }
  }

  let html = `
    <div style="border:0.5px solid var(--mr-border); border-radius:10px; padding:1rem;">
      <div style="font-weight:700; font-size:14px; color:var(--mr-primary); margin-bottom:10px;">Reservá tu turno</div>
  `;

  if (opciones.length === 0) {
    html += `<div style="font-size:13px; color:var(--mr-text-muted);">No hay turnos disponibles en los próximos 21 días. Comunicate con el servicio.</div>`;
  } else {
    opciones.forEach((op, i) => {
      html += `
        <div style="margin-bottom:${i < opciones.length-1 ? '10px' : '0'};">
          <div style="font-size:12px; color:var(--mr-text-muted); margin-bottom:4px; text-transform:capitalize;">${fmtDateLong(op.fecha)}</div>
          <div style="display:flex; gap:6px; flex-wrap:wrap;">
      `;
      op.libres.forEach(h => {
        html += `<button class="btn-horario btn-secondary" data-fecha="${toInputDate(op.fecha)}" data-hora="${h}" style="font-size:12px; padding:6px 10px;">${h}</button>`;
      });
      html += `</div></div>`;
    });
  }

  html += `</div>`;
  view.innerHTML = html;

  document.querySelectorAll('.btn-horario').forEach(btn => {
    btn.addEventListener('click', async () => {
      const _dtP = {pacienteId:pacienteActivo.id, fecha:btn.dataset.fecha, hora:btn.dataset.hora, controlId:controlActivo.id, origen:'online'};
      const _rTP = await reservarTurno_(_dtP);
      if (!_rTP.ok) { alert(_rTP.error||'Ese horario ya no está disponible.'); renderTurnoPaciente(controlActivo, pacienteActivo, estado); return; }
      turnoSeleccionadoPaciente = {fecha: btn.dataset.fecha, hora: btn.dataset.hora};
      renderTurnoPaciente(controlActivo, pacienteActivo, estado).catch(e=>console.error('renderTurnoPaciente:',e));
    });
  });
}

document.getElementById('login-pac-dni').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-login-pac').click();
});

document.getElementById('btn-logout-pac').addEventListener('click', cerrarSesionPaciente);

document.getElementById('btn-login').addEventListener('click', () => {
  const rol = document.getElementById('role-select').value;
  const dni = document.getElementById('login-dni').value.trim();
  const msg = document.getElementById('login-msg');

  if (rol === 'paciente') {
    // Bloquear acceso a profesionales desde la vista paciente
    const esProfesional = profesionales.find(p => p.dni === dni);
    if (esProfesional) {
      msg.style.display = 'block';
      msg.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Este acceso es exclusivo para pacientes.`;
      return;
    }
    const pac = pacientes.find(p => p.dni === dni);
    if (!pac) {
      msg.style.display = 'block';
      msg.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> DNI no encontrado.`;
      return;
    }
    msg.style.display = 'none';
    document.getElementById('body-login').style.display = 'none';
    document.getElementById('body-paciente').style.display = 'flex';
    iniciarSesionPaciente(pac);
    return;
  }

  const prof = profesionales.find(p => p.dni === dni);
  if (!prof) {
    msg.style.display = 'block';
    msg.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> DNI no encontrado. Verificá el número ingresado.`;
    return;
  }
  msg.style.display = 'none';
  iniciarSesion(prof);
});

document.getElementById('login-dni').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-login').click();
});

document.getElementById('btn-logout').addEventListener('click', cerrarSesion);

/* ===================== TOOLTIP GLOBAL ===================== */
const globalTooltip = document.getElementById('global-tooltip');

document.addEventListener('mouseover', (e) => {
  const btn = e.target.closest('.btn-icon-tooltip');
  if (btn && btn.dataset.tooltip) {
    globalTooltip.textContent = btn.dataset.tooltip;
    globalTooltip.style.display = 'block';
  }
});

document.addEventListener('mousemove', (e) => {
  if (globalTooltip.style.display === 'block') {
    globalTooltip.style.left = (e.clientX - globalTooltip.offsetWidth/2) + 'px';
    globalTooltip.style.top = (e.clientY - globalTooltip.offsetHeight - 10) + 'px';
  }
});

document.addEventListener('mouseout', (e) => {
  if (e.target.closest('.btn-icon-tooltip')) {
    globalTooltip.style.display = 'none';
  }
});

// Listener único para botones de eliminar en Administración de datos
document.addEventListener('click', async (e) => {
  const btnPac = e.target.closest('.btn-del-pac-admin');
  if (btnPac) {
    openModalConfirmar(
      `¿Eliminás al paciente "${btnPac.dataset.nombre}"? Esta acción no se puede deshacer.`,
      async () => {
        await eliminarPaciente_(btnPac.dataset.id);
        renderAdminDatos();
      }
    );
    return;
  }
  const btnCtrl = e.target.closest('.btn-del-control-admin');
  if (btnCtrl) {
    openModalConfirmar(
      `¿Eliminás el control del ${btnCtrl.dataset.fecha}? Esta acción no se puede deshacer.`,
      async () => {
        await eliminarControl_(btnCtrl.dataset.id);
        renderControlesParaEliminar(btnCtrl.dataset.pac);
        renderDash();
      }
    );
  }
});

function openModalConfirmar(mensaje, onConfirm) {
  const overlay = document.getElementById('modal-overlay');
  const content = document.getElementById('modal-content');
  overlay.classList.add('show');
  content.style.maxWidth = '400px';
  content.innerHTML = `
    <div style="display:flex; align-items:flex-start; gap:12px; margin-bottom:1.25rem;">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--mr-coral-text)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0; margin-top:2px;"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
      <p style="margin:0; font-size:14px; line-height:1.5;">${mensaje}</p>
    </div>
    <div style="display:flex; gap:8px;">
      <button id="modal-confirmar-ok" class="btn-primary" style="background:var(--mr-coral-text); border-color:var(--mr-coral-text);">Eliminar</button>
      <button id="modal-confirmar-cancel" class="btn-secondary">Cancelar</button>
    </div>
  `;
  document.getElementById('modal-confirmar-cancel').addEventListener('click', () => {
    content.style.maxWidth = '';
    closeModal();
  });
  document.getElementById('modal-confirmar-ok').addEventListener('click', () => {
    content.style.maxWidth = '';
    closeModal();
    onConfirm();
  });
}

// Determinar vista (personal/paciente) según parámetro de URL y auto-login si viene ?dni=
actualizarTextoInstitucional();
(function() {
  const params = new URLSearchParams(window.location.search);
  const vista = params.get('vista');
  const dniParam = params.get('dni');
  const esPersonal = vista === 'personal';

  document.getElementById('role-select').value = esPersonal ? 'personal' : 'paciente';
  document.getElementById('login-dni').placeholder = esPersonal ? 'Ej: 28123456' : 'Ej: 25876543';

  if (!esPersonal && dniParam) {
    // Auto-login de paciente vía link con DNI incluido (ej. enviado por WhatsApp)
    const esProfesional = profesionales.find(p => p.dni === dniParam);
    const pac = !esProfesional ? pacientes.find(p => p.dni === dniParam) : null;
    if (pac) {
      document.getElementById('body-login').style.display = 'none';
      document.getElementById('body-paciente').style.display = 'flex';
      iniciarSesionPaciente(pac);
      return;
    }
  }
  cerrarSesion();
})();
